<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Elite v25 - Elite Chronos</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #050505; --card-bg: #111111; --text-main: #ffffff;
            --accent-red: #ff3c3c; --accent-gold: #ffbc00; --accent-green: #00ff88;
        }

        body { 
            font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; width: 100%; max-width: 1400px; padding-bottom: 120px; }
        .column { background: var(--card-bg); border-radius: 24px; padding: 24px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .column-title { font-size: 1.2rem; font-weight: 800; color: var(--accent-red); text-transform: uppercase; margin-bottom: 5px; display: block; }
        
        /* CHRONO STYLE */
        .time-left { font-size: 0.75rem; color: #555; margin-bottom: 15px; font-weight: 500; letter-spacing: 0.5px; }

        /* PROGRESS BAR WITH GRADIENT & PERCENT */
        .progress-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; }
        .progress-percent { font-size: 0.8rem; font-weight: 700; color: #777; }
        .progress-container { background: #1a1a1a; height: 6px; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { 
            height: 100%; width: 0%; transition: width 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67); 
            background: linear-gradient(90deg, var(--accent-red), var(--accent-gold), var(--accent-green));
            background-size: 1400px; /* Pour garder le dégradé constant */
        }

        ul { list-style: none; padding: 0; margin: 0; }
        .task-card { 
            background: linear-gradient(145deg, #181818, #141414); margin-bottom: 12px; padding: 16px; 
            border-radius: 16px; border: 1px solid rgba(255,255,255,0.03); transition: 0.3s;
        }
        .task-card.locked { opacity: 0.35; filter: grayscale(1); pointer-events: none; }
        
        .check-circle { width: 22px; height: 22px; border: 2px solid #333; border-radius: 50%; cursor: pointer; position: relative; flex-shrink: 0; }
        .task-card.completed .check-circle { background: var(--accent-red); border-color: var(--accent-red); }
        .task-card.completed .check-circle::after { content: '✓'; position: absolute; color: white; font-size: 14px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        
        .task-text { font-weight: 600; cursor: pointer; flex-grow: 1; }
        .date-badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; background: #222; color: #777; margin-top: 5px; display: inline-block; }
        .stat-badge { background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 6px; font-size: 0.7rem; color: var(--accent-gold); }

        /* MODAL & FORM */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(10px); }
        .modal-content { background: #111; padding: 30px; border-radius: 24px; width: 90%; max-width: 480px; border: 1px solid #222; max-height: 85vh; overflow-y: auto; }
        .form-step { display: none; margin-bottom: 20px; animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        label { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 8px; }
        input, select { width: 100%; background: #000; border: 1px solid #222; color: white; padding: 12px; border-radius: 10px; box-sizing: border-box; outline: none; }
        
        .toggle-container { display: flex; align-items: center; gap: 10px; background: #000; padding: 12px; border-radius: 10px; border: 1px solid #222; cursor: pointer; margin-top: 10px;}
        .toggle-container input { width: auto; margin: 0; cursor: pointer; }

        .parent-selector { background: #080808; border: 1px solid #222; border-radius: 10px; padding: 10px; margin-top: 10px; }
        .parent-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 0.85rem; }
        .parent-row input[type="number"] { width: 60px; padding: 5px; text-align: center; }

        .btn-add { background: var(--accent-red); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .fab { position: fixed; bottom: 40px; right: 40px; width: 64px; height: 64px; background: var(--accent-red); border-radius: 20px; border: none; color: white; font-size: 32px; cursor: pointer; z-index: 100; box-shadow: 0 10px 30px rgba(255, 60, 60, 0.3); }
        
        .requirement-list { margin-top: 10px; font-size: 0.7rem; color: var(--accent-gold); border-top: 1px solid rgba(255,188,0,0.1); padding-top: 8px; }
        .req-item { display: flex; justify-content: space-between; padding: 2px 0; }
    </style>
</head>
<body>

<div id="taskModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle" style="color:var(--accent-red); margin-top:0;">CONFIGURATION</h2>
        <input type="hidden" id="editTaskId">
        
        <div class="form-step" id="step-name" style="display:block;">
            <label>Titre de l'objectif</label>
            <input type="text" id="taskName" placeholder="Titre..." oninput="checkSteps()">
        </div>

        <div class="form-step" id="step-scope">
            <label>Portée temporelle</label>
            <select id="taskScope" onchange="checkSteps()">
                <option value="today">Journalier</option>
                <option value="week">Semaine</option>
                <option value="month">Mois</option>
                <option value="year">Année</option>
            </select>
            <div id="dateWrapper" style="display:none; margin-top:15px;">
                <label>Date précise (Optionnelle)</label>
                <input type="date" id="taskDate">
            </div>
        </div>

        <div class="form-step" id="step-dep-toggle">
            <label class="toggle-container">
                <input type="checkbox" id="hasDeps" onchange="checkSteps()">
                <span>Activer des liens de parenté ?</span>
            </label>
            <div id="parentListWrapper" style="display:none;">
                <div class="parent-selector" id="parentList"></div>
            </div>
        </div>

        <div class="form-step" id="step-recur">
            <label>Récurrence automatique</label>
            <select id="taskRecur" onchange="checkSteps()">
                <option value="">Mission Unique</option>
                <option value="Quotidien">Quotidien</option>
                <option value="Hebdomadaire">Hebdomadaire</option>
                <option value="Mensuel">Mensuel</option>
                <option value="Annuel">Annuel</option>
            </select>
        </div>

        <div class="form-step" id="step-submit">
            <button class="btn-add" onclick="saveTask()">DÉPLOYER</button>
        </div>
        <button style="width:100%; background:none; border:none; color:#444; margin-top:15px; cursor:pointer;" onclick="closeModal()">Annuler</button>
    </div>
</div>

<h1 id="currentDateDisplay" style="font-size:0.9rem; color:#444; letter-spacing:2px; margin-bottom:15px;">...</h1>
<div class="dashboard-grid" id="mainGrid"></div>
<button class="fab" onclick="openCreateModal()">+</button>

<script>
    let allTasks = JSON.parse(localStorage.getItem('v25_tasks')) || [];
    let totalCounts = JSON.parse(localStorage.getItem('v25_counts')) || {};
    const columns = [
        { id: 'today', label: "Journalier" },
        { id: 'week', label: "Semaine" },
        { id: 'month', label: "Mois" },
        { id: 'year', label: "Année" }
    ];

    function checkSteps() {
        const name = document.getElementById('taskName').value.trim();
        const scope = document.getElementById('taskScope').value;
        const hasDeps = document.getElementById('hasDeps').checked;
        const currentId = document.getElementById('editTaskId').value;
        
        document.getElementById('step-scope').style.display = name.length > 0 ? 'block' : 'none';
        document.getElementById('dateWrapper').style.display = (name.length > 0 && scope === 'today') ? 'block' : 'none';

        if (name.length > 0) {
            const others = allTasks.filter(t => t.id !== currentId);
            document.getElementById('step-dep-toggle').style.display = others.length > 0 ? 'block' : 'none';
            document.getElementById('parentListWrapper').style.display = hasDeps ? 'block' : 'none';
            document.getElementById('step-recur').style.display = 'block';
            document.getElementById('step-submit').style.display = 'block';
        }
    }

    function getTimeLeft(scope) {
        const now = new Date();
        if (scope === 'today') {
            const endOfDay = new Date(now); endOfDay.setHours(23, 59, 59, 999);
            const diff = endOfDay - now;
            return `Reste ${Math.floor(diff/3600000)}h ${Math.floor((diff%3600000)/60000)}m`;
        }
        if (scope === 'week') {
            const lastDay = 7;
            const currentDay = now.getDay() === 0 ? 7 : now.getDay();
            return `Reste ${lastDay - currentDay} jours`;
        }
        if (scope === 'month') {
            const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            return `Reste ${lastDay - now.getDate()} jours`;
        }
        if (scope === 'year') {
            return `Reste ${11 - now.getMonth()} mois`;
        }
        return "";
    }

    function openCreateModal() {
        document.getElementById('modalTitle').innerText = "NOUVEAU PLAN";
        document.getElementById('editTaskId').value = "";
        document.getElementById('taskName').value = "";
        document.getElementById('taskDate').value = "";
        document.getElementById('taskScope').value = "today";
        document.getElementById('hasDeps').checked = false;
        renderParentList();
        checkSteps();
        document.getElementById('taskModal').style.display = 'flex';
    }

    function openEditModal(id) {
        const task = allTasks.find(t => t.id === id);
        if(!task) return;
        document.getElementById('editTaskId').value = id;
        document.getElementById('taskName').value = task.text;
        document.getElementById('taskDate').value = task.date || "";
        document.getElementById('taskScope').value = task.scope || 'today';
        document.getElementById('taskRecur').value = task.recurrence || "";
        document.getElementById('hasDeps').checked = task.requirements?.length > 0;
        renderParentList(task.requirements || []);
        checkSteps();
        document.getElementById('taskModal').style.display = 'flex';
    }

    function renderParentList(existingReqs = []) {
        const list = document.getElementById('parentList');
        list.innerHTML = '';
        const currentId = document.getElementById('editTaskId').value;
        allTasks.filter(t => t.id !== currentId).forEach(t => {
            const req = existingReqs.find(r => r.parentId === t.id);
            list.innerHTML += `
                <div class="parent-row">
                    <input type="checkbox" class="parent-check" value="${t.id}" ${req ? 'checked' : ''}>
                    <span style="flex-grow:1">${t.text}</span>
                    <input type="number" class="parent-quota" value="${req ? req.quota : 1}" min="1">
                </div>`;
        });
    }

    function closeModal() { document.getElementById('taskModal').style.display = 'none'; }

    function saveTask() {
        const id = document.getElementById('editTaskId').value;
        const name = document.getElementById('taskName').value.trim();
        const scope = document.getElementById('taskScope').value;
        const date = (scope === 'today') ? document.getElementById('taskDate').value : "";
        const recur = document.getElementById('taskRecur').value;
        const hasDeps = document.getElementById('hasDeps').checked;
        
        let reqs = hasDeps ? Array.from(document.querySelectorAll('.parent-row')).filter(r => r.querySelector('.parent-check').checked).map(r => ({
            parentId: r.querySelector('.parent-check').value,
            quota: parseInt(r.querySelector('.parent-quota').value) || 1
        })) : [];

        if (id) {
            let task = allTasks.find(t => t.id === id);
            Object.assign(task, { text: name, date, scope, recurrence: recur, requirements: reqs });
        } else {
            allTasks.push({ id: "T-"+Date.now(), text: name, date, scope, recurrence: recur, requirements: reqs, completed: false });
        }
        closeModal(); updateUI();
    }

    function toggleTask(id) {
        const task = allTasks.find(t => t.id === id);
        if (task.requirements?.some(req => (totalCounts[req.parentId] || 0) < req.quota) && !task.completed) {
            alert("Bloqué : Quotas parents non atteints."); return;
        }
        task.completed = !task.completed;
        if(task.completed) {
            totalCounts[task.id] = (totalCounts[task.id] || 0) + 1;
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        } else {
            totalCounts[task.id] = Math.max(0, (totalCounts[task.id] || 0) - 1);
        }
        updateUI();
    }

    function updateUI() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';
        const now = new Date();
        const todayStr = now.toISOString().split('T')[0];
        document.getElementById('currentDateDisplay').innerText = now.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' }).toUpperCase();

        const startOfWeek = new Date(now);
        startOfWeek.setDate(now.getDate() - (now.getDay() === 0 ? 6 : now.getDay() - 1));
        const endOfWeek = new Date(startOfWeek); endOfWeek.setDate(startOfWeek.getDate() + 6);

        columns.forEach(col => {
            let filtered = allTasks.filter(t => {
                if (t.scope !== col.id) return false;
                if (!t.date) return true;
                const tDate = new Date(t.date);
                if (col.id === 'today') return t.date === todayStr;
                if (col.id === 'week') return tDate >= startOfWeek && tDate <= endOfWeek;
                if (col.id === 'month') return tDate.getMonth() === now.getMonth() && tDate.getFullYear() === now.getFullYear();
                if (col.id === 'year') return tDate.getFullYear() === now.getFullYear();
                return false;
            });

            const completedCount = filtered.filter(tk=>tk.completed).length;
            const percent = filtered.length ? Math.round((completedCount / filtered.length)*100) : 0;
            let listHtml = '';

            filtered.forEach(tk => {
                let isLocked = tk.requirements?.some(req => (totalCounts[req.parentId] || 0) < req.quota);
                listHtml += `
                    <li class="task-card ${tk.completed ? 'completed' : ''} ${isLocked && !tk.completed ? 'locked' : ''}">
                        <div style="display:flex; justify-content:space-between; align-items:center">
                            <span class="badge" style="font-size:0.6rem; color:#555">${tk.recurrence || 'UNIQUE'}</span>
                            <div style="display:flex; align-items:center; gap:8px">
                                <span class="stat-badge">Σ ${totalCounts[tk.id]||0}</span>
                                <button onclick="deleteTask('${tk.id}')" style="background:none; border:none; color:#333; cursor:pointer;">×</button>
                            </div>
                        </div>
                        <div style="display:flex; align-items:center; gap:12px; margin-top:8px">
                            <div class="check-circle" onclick="toggleTask('${tk.id}')"></div>
                            <span class="task-text" onclick="openEditModal('${tk.id}')">${tk.text}</span>
                        </div>
                        <div class="date-badge">${tk.date || 'PERMANENT'}</div>
                        ${tk.requirements?.length > 0 ? `<div class="requirement-list">${tk.requirements.map(r => {
                            const p = allTasks.find(at => at.id === r.parentId);
                            return `<div class="req-item"><span>${p?p.text:'?'}</span> <span>${totalCounts[r.parentId]||0}/${r.quota}</span></div>`;
                        }).join('')}</div>` : ''}
                    </li>`;
            });

            grid.innerHTML += `
                <div class="column">
                    <span class="column-title">${col.label}</span>
                    <div class="time-left">${getTimeLeft(col.id)}</div>
                    <div class="progress-header">
                        <span class="progress-percent">${percent}%</span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar" style="width:${percent}%"></div>
                    </div>
                    <ul>${listHtml}</ul>
                </div>`;
        });

        localStorage.setItem('v25_tasks', JSON.stringify(allTasks));
        localStorage.setItem('v25_counts', JSON.stringify(totalCounts));
    }

    function deleteTask(id) { if(confirm("Supprimer ?")) { allTasks = allTasks.filter(t => t.id !== id); updateUI(); } }

    updateUI();
    setInterval(updateUI, 60000); // Rafraîchir le chrono chaque minute
</script>
</body>
</html>
