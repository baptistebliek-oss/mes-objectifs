<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Elite - Design V8</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #050505; --card-bg: #111111; --text-main: #ffffff; --text-dim: #777;
            --accent-red: #ff3c3c; --accent-red-dim: rgba(255, 60, 60, 0.1);
            --cat-sport: #4CAF50; --cat-travail: #2196F3; --cat-perso: #FFEB3B; --cat-finance: #9C27B0; --cat-autre: #555;
        }

        body { 
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg-color); color: var(--text-main); 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; letter-spacing: -0.02em;
        }

        /* --- MINI HEATMAP --- */
        .mini-history { 
            display: flex; align-items: center; gap: 12px; background: #000; 
            padding: 10px 20px; border-radius: 50px; margin-bottom: 30px; border: 1px solid #222; 
        }
        .heatmap-mini { display: flex; gap: 4px; }
        .day-sq { width: 10px; height: 10px; border-radius: 2px; background: #1a1a1a; transition: 0.3s; }

        /* --- GRILLE & COLONNES --- */
        .dashboard-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 25px; width: 100%; max-width: 1400px; padding-bottom: 120px; 
        }
        .column { 
            background: var(--card-bg); border-radius: 24px; padding: 24px; 
            border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .column-header { text-align: left; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .column-title { font-size: 1.3rem; font-weight: 800; color: var(--accent-red); text-transform: uppercase; letter-spacing: 1px; }
        .timer { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--text-dim); display: block; margin-top: 4px; }
        
        .progress-info { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .progress-container { background: #1a1a1a; height: 4px; flex-grow: 1; border-radius: 10px; margin-right: 15px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; transition: width 1s cubic-bezier(0.19, 1, 0.22, 1); }
        .perc { font-size: 0.8rem; font-weight: 900; color: var(--accent-red); }

        /* --- AFFICHAGE DES OBJECTIFS --- */
        ul { list-style: none; padding: 0; margin: 0; }
        .task-card { 
            background: linear-gradient(145deg, #181818, #141414);
            margin-bottom: 12px; padding: 16px; border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.03);
            display: flex; flex-direction: column; gap: 8px;
            transition: all 0.3s ease;
        }
        .task-card:hover { transform: translateY(-3px); border-color: rgba(255, 60, 60, 0.3); background: #1c1c1c; }
        
        .task-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .task-main { display: flex; align-items: center; gap: 12px; }
        
        /* Custom Checkbox */
        .check-circle { 
            width: 22px; height: 22px; border: 2px solid #333; border-radius: 50%; 
            cursor: pointer; flex-shrink: 0; transition: all 0.2s; position: relative;
        }
        .task-card.completed .check-circle { background: var(--accent-red); border-color: var(--accent-red); }
        .task-card.completed .check-circle::after { 
            content: '✓'; position: absolute; color: white; font-size: 14px; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        .task-text { font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .task-card.completed .task-text { color: #444; text-decoration: line-through; }
        
        .badges-row { display: flex; gap: 6px; flex-wrap: wrap; }
        .badge { font-size: 0.6rem; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; font-weight: 800; }
        .recur-badge { background: rgba(255,255,255,0.05); color: #666; font-size: 0.6rem; padding: 3px 8px; border-radius: 6px; }

        .delete-btn { color: #333; background: none; border: none; cursor: pointer; font-size: 1.2rem; transition: color 0.2s; }
        .delete-btn:hover { color: #ff3c3c; }

        /* --- MODALE & FAB --- */
        .fab { position: fixed; bottom: 40px; right: 40px; width: 64px; height: 64px; background: var(--accent-red); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 32px; color: white; cursor: pointer; box-shadow: 0 10px 30px rgba(255, 60, 60, 0.4); border: none; z-index: 100; transition: 0.3s; transform: rotate(0deg); }
        .fab:hover { transform: scale(1.1) rotate(90deg); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 500; backdrop-filter: blur(10px); }
        .modal-content { background: #111; padding: 40px; border-radius: 30px; width: 90%; max-width: 450px; border: 1px solid #222; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; color: #555; text-transform: uppercase; font-weight: bold; margin-bottom: 8px; }
        input, select { width: 100%; background: #000; border: 1px solid #222; color: white; padding: 14px; border-radius: 12px; font-size: 1rem; }
        .btn-add { background: var(--accent-red); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px; }

        #bravoOverlay { position: fixed; inset: 0; display: none; justify-content: center; align-items: center; z-index: 2000; background: rgba(0,0,0,0.9); pointer-events: none; }
        #bravoOverlay h2 { font-size: 6rem; color: var(--accent-red); font-weight: 900; filter: drop-shadow(0 0 20px var(--accent-red)); }
    </style>
</head>
<body>

<div id="bravoOverlay"><h2>BAM !</h2></div>

<button class="fab" onclick="toggleModal(true)">+</button>

<div class="modal" id="addModal">
    <div class="modal-content">
        <h2 style="color:var(--accent-red); margin-bottom:25px; text-transform:uppercase; font-size:1.2rem;">Nouvelle Mission</h2>
        <div class="form-group">
            <label>Objectif</label>
            <input type="text" id="taskName" placeholder="Taper ici..." autocomplete="off">
        </div>
        <div class="form-group">
            <label>Échéance</label>
            <select id="taskTarget">
                <option value="journalier">Aujourd'hui</option>
                <option value="hebdomadaire">Cette Semaine</option>
                <option value="mensuel">Ce Mois</option>
                <option value="annuel">Cette Année</option>
            </select>
        </div>
        <div class="form-group">
            <label>Catégorie</label>
            <select id="taskCat">
                <option value="sport">🏃 Sport</option>
                <option value="travail">💼 Travail</option>
                <option value="perso">🏠 Perso</option>
                <option value="finance">💰 Finance</option>
                <option value="autre">📍 Autre</option>
            </select>
        </div>
        <div class="form-group">
            <label>Récurrence</label>
            <select id="taskRecur">
                <option value="">Une seule fois</option>
                <option value="Quotidien">🔄 Quotidien</option>
                <option value="Hebdomadaire">📅 Hebdo</option>
            </select>
        </div>
        <button class="btn-add" onclick="createNewTask()">LANCER LA MISSION</button>
        <button style="background:none; border:none; color:#444; width:100%; margin-top:15px; cursor:pointer;" onclick="toggleModal(false)">Annuler</button>
    </div>
</div>

<h1>PERFORMANCE ELITE</h1>

<div class="mini-history">
    <div class="heatmap-mini" id="miniHeatmap"></div>
    <button style="background:none; border:none; color:var(--accent-red); font-size:0.7rem; font-weight:bold; cursor:pointer;" onclick="toggleFullHistory(true)">FULL STATS</button>
</div>

<div class="dashboard-grid" id="mainGrid"></div>

<script>
    let allData = JSON.parse(localStorage.getItem('v8_performance_data')) || { journalier: [], hebdomadaire: [], mensuel: [], annuel: [] };
    let historyData = JSON.parse(localStorage.getItem('v8_history_data')) || {};

    const types = [{id:'journalier', label:"Journalier"}, {id:'hebdomadaire', label:"Hebdo"}, {id:'mensuel', label:"Mensuel"}, {id:'annuel', label:"Annuel"}];

    const grid = document.getElementById('mainGrid');
    types.forEach(t => {
        grid.innerHTML += `
            <div class="column" id="col-${t.id}">
                <div class="column-header">
                    <div class="column-title">${t.label}</div>
                    <span class="timer" id="timer-${t.id}">--:--:--</span>
                    <div class="progress-info">
                        <div class="progress-container"><div class="progress-bar"></div></div>
                        <span class="perc">0%</span>
                    </div>
                </div>
                <ul id="list-${t.id}"></ul>
            </div>
        `;
    });

    function toggleModal(show) {
        document.getElementById('addModal').style.display = show ? 'flex' : 'none';
        if(show) document.getElementById('taskName').focus();
    }

    function createNewTask() {
        const name = document.getElementById('taskName').value;
        const target = document.getElementById('taskTarget').value;
        const cat = document.getElementById('taskCat').value;
        const recur = document.getElementById('taskRecur').value;
        if (!name.trim()) return;
        allData[target].push({ id: Date.now(), text: name, category: cat, recurrence: recur, completed: false });
        toggleModal(false);
        document.getElementById('taskName').value = '';
        updateUI();
    }

    function toggleTask(type, id) {
        allData[type] = allData[type].map(t => {
            if (t.id === id) {
                if(!t.completed) {
                    confetti({ particleCount: 100, spread: 70, origin: { y: 0.8 }, colors: ['#ff3c3c', '#ffffff'] });
                }
                return {...t, completed: !t.completed};
            }
            return t;
        });
        updateUI();
    }

    function deleteTask(type, id) {
        allData[type] = allData[type].filter(t => t.id !== id);
        updateUI();
    }

    function updateUI() {
        types.forEach(t => {
            const list = document.getElementById(`list-${t.id}`);
            list.innerHTML = '';
            allData[t.id].forEach(tk => {
                const li = document.createElement('li');
                li.className = `task-card ${tk.completed ? 'completed' : ''}`;
                li.innerHTML = `
                    <div class="task-top">
                        <div class="badges-row">
                            <span class="badge" style="background:var(--cat-${tk.category}); color:${tk.category==='perso'||tk.category==='sport'?'#000':'#fff'}">${tk.category}</span>
                            ${tk.recurrence ? `<span class="recur-badge">${tk.recurrence}</span>` : ''}
                        </div>
                        <button class="delete-btn" onclick="deleteTask('${t.id}', ${tk.id})">×</button>
                    </div>
                    <div class="task-main">
                        <div class="check-circle" onclick="toggleTask('${t.id}', ${tk.id})"></div>
                        <span class="task-text" onclick="toggleTask('${t.id}', ${tk.id})">${tk.text}</span>
                    </div>
                `;
                list.appendChild(li);
            });
            const percent = allData[t.id].length === 0 ? 0 : Math.round((allData[t.id].filter(tk=>tk.completed).length / allData[t.id].length)*100);
            const col = document.getElementById(`col-${t.id}`);
            col.querySelector('.progress-bar').style.width = percent + '%';
            col.querySelector('.progress-bar').style.backgroundColor = `hsl(0, 100%, ${30+(percent*0.4)}%)`;
            col.querySelector('.perc').innerText = percent + '%';
        });
        localStorage.setItem('v8_performance_data', JSON.stringify(allData));
        renderMiniHeatmap();
    }

    function renderMiniHeatmap() {
        const mini = document.getElementById('miniHeatmap'); mini.innerHTML = '';
        const today = new Date().toISOString().split('T')[0];
        let total = 0, comp = 0;
        Object.values(allData).forEach(arr => { total += arr.length; comp += arr.filter(t=>t.completed).length; });
        historyData[today] = total === 0 ? 0 : Math.round((comp/total)*100);
        localStorage.setItem('v8_history_data', JSON.stringify(historyData));
        for (let i = 20; i >= 0; i--) {
            const d = new Date(); d.setDate(d.getDate() - i);
            const key = d.toISOString().split('T')[0];
            const val = historyData[key] || 0;
            const sq = document.createElement('div');
            sq.className = 'day-sq';
            if(val > 0) sq.style.background = `hsl(0, 100%, ${Math.max(15, val/2)}%)`;
            mini.appendChild(sq);
        }
    }

    function updateTimers() {
        const now = new Date();
        document.getElementById('timer-journalier').innerText = format(new Date().setHours(23,59,59) - now);
        const nextSun = new Date(); nextSun.setDate(now.getDate() + (7 - now.getDay()) % 7); nextSun.setHours(23,59,59);
        document.getElementById('timer-hebdomadaire').innerText = format(nextSun - now, true);
        const nextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59);
        document.getElementById('timer-mensuel').innerText = format(nextMonth - now, true);
        const nextYear = new Date(now.getFullYear(), 11, 31, 23, 59, 59);
        document.getElementById('timer-annuel').innerText = format(nextYear - now, true);
    }

    function format(ms, day=false) {
        let s=Math.floor(ms/1000), m=Math.floor(s/60), h=Math.floor(m/60), d=Math.floor(h/24);
        return (day?d+"d ":"")+ (h%24).toString().padStart(2,0)+":"+(m%60).toString().padStart(2,0)+":"+(s%60).toString().padStart(2,0);
    }

    setInterval(updateTimers, 1000);
    updateUI();
</script>
</body>
</html>
