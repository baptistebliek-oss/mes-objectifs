<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Performance Elite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
:root {
  --bg:        #0d0d0f;
  --s1:        #141416;
  --s2:        #1a1a1d;
  --s3:        #202024;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.04);
  --text:      #f0f0f2;
  --text2:     #8a8a96;
  --text3:     #46464f;
  --violet:    #7c6af7;
  --blue:      #5b9cf6;
  --green:     #34d399;
  --amber:     #fbbf24;
  --red:       #f87171;
  --font: 'Plus Jakarta Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 100px;
}

/* ── TOPBAR ── */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(13,13,15,.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border2);
  padding: 0 28px; height: 64px;
  display: flex; align-items: center; justify-content: space-between;
}
.topbar-left { display: flex; align-items: center; gap: 14px; }
.logo {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--violet), var(--blue));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 800; color: #fff; flex-shrink: 0;
}
.topbar-title { font-size: .95rem; font-weight: 700; color: var(--text); }
#dateDisplay { font-size: .75rem; font-weight: 500; color: var(--text3); letter-spacing: .4px; }

/* ── MAIN ── */
.main { padding: 28px 20px; max-width: 1440px; margin: 0 auto; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
  align-items: start;
}

/* ── COLUMN ── */
.col {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
}
.col-header {
  padding: 18px 18px 14px;
  border-bottom: 1px solid var(--border2);
}
.col-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.col-label-wrap { display: flex; flex-direction: column; gap: 3px; }
.col-title { font-size: .95rem; font-weight: 700; color: var(--text); }
.time-left { font-size: .68rem; font-weight: 500; color: var(--text3); }

/* Ring */
.ring-wrap { position: relative; width: 42px; height: 42px; flex-shrink: 0; }
.ring-wrap svg { transform: rotate(-90deg); display: block; }
.ring-bg   { fill: none; stroke: var(--s3); stroke-width: 3.5; }
.ring-fill { fill: none; stroke-width: 3.5; stroke-linecap: round;
             transition: stroke-dashoffset .7s cubic-bezier(.4,0,.2,1); }
.ring-pct {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: .58rem; font-weight: 800;
}
.col-count { font-size: .68rem; font-weight: 600; color: var(--text3); margin-top: 2px; }

.prog-track { height: 3px; background: var(--s3); border-radius: 99px; overflow: hidden; }
.prog-bar   { height: 100%; border-radius: 99px; opacity: .65; transition: width .7s cubic-bezier(.4,0,.2,1); }

/* ── TASK LIST ── */
.task-list { list-style: none; padding: 10px; display: flex; flex-direction: column; gap: 6px; min-height: 50px; }

.task-card {
  background: var(--s2);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 12px 13px;
  transition: background .18s, border-color .18s, opacity .2s, filter .2s, transform .1s;
  cursor: grab;
}
.task-card:active { cursor: grabbing; }
.task-card.dragging { opacity: 0.4; transform: scale(0.98); border: 1px dashed var(--violet); }
.task-card:hover { background: var(--s3); border-color: var(--border); }
.task-card.locked { opacity: .25; filter: grayscale(1); pointer-events: none; }
.task-card.done { background: rgba(52,211,153,.04); border-color: rgba(52,211,153,.13); }

.task-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 9px;
  pointer-events: none; /* Laisse le drag se faire sur toute la carte */
}
.recur-pill {
  font-size: .58rem; font-weight: 700; letter-spacing: .7px;
  text-transform: uppercase; color: var(--text3);
  background: var(--s3); padding: 2px 7px; border-radius: 99px;
}
.del-btn {
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  background: none; border: none; color: var(--text3);
  cursor: pointer; border-radius: 6px;
  transition: background .15s, color .15s;
  pointer-events: auto; /* Réactive le clic pour supprimer */
}
.del-btn:hover { background: rgba(248,113,113,.1); color: var(--red); }

.task-body { display: flex; align-items: center; gap: 11px; }

.check {
  width: 20px; height: 20px;
  border: 2px solid var(--s3); border-radius: 7px; flex-shrink: 0;
  cursor: pointer; position: relative; background: var(--s1);
  transition: background .2s, border-color .2s, transform .12s;
}
.check:hover { border-color: var(--violet); transform: scale(1.1); }
.task-card.done .check { background: var(--green); border-color: var(--green); }
.task-card.done .check::after {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 12 10' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 5l3.5 3.5L11 1' stroke='%23fff' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") center/11px no-repeat;
}

.task-text {
  font-size: .875rem; font-weight: 500; line-height: 1.45;
  color: var(--text); cursor: pointer; flex: 1;
  transition: color .15s;
}
.task-text:hover { color: #fff; }
.task-card.done .task-text { color: var(--text3); text-decoration: line-through; }

.sub-prog {
  height: 2px; background: var(--s3);
  border-radius: 99px; overflow: hidden; margin-top: 10px;
}
.sub-prog-fill { height: 100%; transition: width .4s ease; }

/* ── MODAL & AUTRES ── */
.empty { text-align: center; padding: 30px 16px; color: var(--text3); font-size: .8rem; }
.empty-icon { font-size: 1.6rem; margin-bottom: 6px; opacity: .35; }

.fab {
  position: fixed; bottom: 28px; right: 28px;
  width: 54px; height: 54px;
  background: linear-gradient(135deg, var(--violet), var(--blue));
  border: none; border-radius: 16px; color: #fff;
  cursor: pointer; z-index: 200;
  box-shadow: 0 8px 28px rgba(124,106,247,.35);
  display: flex; align-items: center; justify-content: center;
  transition: transform .15s, box-shadow .15s;
}
.fab:hover { transform: scale(1.06) translateY(-2px); box-shadow: 0 14px 36px rgba(124,106,247,.45); }
.fab:active { transform: scale(.96); }

.overlay {
  position: fixed; inset: 0;
  background: rgba(5,5,8,.82);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  display: none; align-items: flex-end; justify-content: center;
  z-index: 1000; padding: 12px;
}
@media (min-width: 600px) { .overlay { align-items: center; } }

.modal {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 24px; padding: 24px;
  width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto;
  animation: slideUp .24s cubic-bezier(.4,0,.2,1);
}
@keyframes slideUp {
  from { opacity:0; transform: translateY(18px); }
  to   { opacity:1; transform: translateY(0); }
}
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
.modal-title { font-size: 1rem; font-weight: 800; color: var(--text); }
.modal-close {
  width: 30px; height: 30px; background: var(--s2); border: 1px solid var(--border2);
  border-radius: 8px; color: var(--text2); font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}

.form-group { margin-bottom: 15px; }
.form-label { display: block; font-size: .68rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }
input[type="text"], input[type="date"], input[type="number"], select {
  width: 100%; background: var(--s2); border: 1px solid var(--border);
  color: var(--text); padding: 10px 13px; border-radius: 11px;
  font-family: var(--font); font-size: .875rem; font-weight: 500; outline: none;
}

.toggle-row {
  display: flex; align-items: center; gap: 10px;
  background: var(--s2); border: 1px solid var(--border);
  border-radius: 11px; padding: 10px 13px; cursor: pointer;
  font-size: .875rem; font-weight: 500; color: var(--text2);
}

.days-row { display: flex; gap: 5px; margin-top: 10px; }
.day-btn {
  flex: 1; padding: 8px 0; background: var(--s2); border: 1px solid var(--border);
  border-radius: 9px; color: var(--text3); font-size: .7rem; font-weight: 600; cursor: pointer;
  text-align: center; transition: all .15s;
}
.day-btn.on { background: var(--violet); color: #fff; border-color: var(--violet); }

.parent-list { background: var(--s2); border: 1px solid var(--border); border-radius: 11px; padding: 8px; margin-top: 8px; }
.parent-row { display: flex; align-items: center; gap: 8px; padding: 7px 5px; font-size: .82rem; color: var(--text2); border-bottom: 1px solid var(--border2); }

.btn-save {
  width: 100%; background: linear-gradient(135deg, var(--violet), var(--blue));
  color: #fff; border: none; padding: 13px; border-radius: 12px; font-family: var(--font);
  font-size: .9rem; font-weight: 700; cursor: pointer; box-shadow: 0 4px 20px rgba(124,106,247,.28);
}
.btn-cancel { width: 100%; background: none; border: none; color: var(--text3); padding: 10px; cursor: pointer; margin-top: 6px; }

.hidden { display: none !important; }

#bravo {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  pointer-events: none; z-index: 9999; opacity: 0;
}
#bravo.show { animation: bravoAnim 1.8s ease forwards; }
@keyframes bravoAnim {
  0%    { opacity:0; transform:scale(.65); }
  14%   { opacity:1; transform:scale(1.06); }
  30%   { transform:scale(.98); }
  45%   { transform:scale(1.02); }
  68%   { opacity:1; transform:scale(1); }
  100% { opacity:0; transform:scale(1.1); }
}
.bravo-word {
  font-size: clamp(5rem,18vw,10rem); font-weight: 800; letter-spacing: 6px;
  background: linear-gradient(135deg, var(--violet) 0%, var(--blue) 50%, var(--green) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 0 50px rgba(124,106,247,.6)); line-height: 1;
}
.bravo-sub { font-size: .88rem; font-weight: 600; letter-spacing: 5px; text-transform: uppercase; color: rgba(255,255,255,.22); margin-top: 10px; }
</style>
</head>
<body>

<div id="bravo">
  <div class="bravo-word">BRAVO</div>
  <div class="bravo-sub">Objectif accompli</div>
</div>

<header class="topbar">
  <div class="topbar-left">
    <div class="logo">P</div>
    <span class="topbar-title">Performance Elite</span>
  </div>
  <span id="dateDisplay"></span>
</header>

<main class="main">
  <div class="grid" id="grid"></div>
</main>

<button class="fab" onclick="openModal()" title="Nouvel objectif">
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
    <path d="M10 3v14M3 10h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
  </svg>
</button>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Nouvel objectif</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <input type="hidden" id="editId">

    <div class="form-group">
      <label class="form-label">Nom de l'objectif</label>
      <input type="text" id="fName" placeholder="Ex: Méditer 10 minutes…" oninput="syncForm()">
    </div>

    <div class="form-group hidden" id="grpScope">
      <label class="form-label">Portée</label>
      <select id="fScope" onchange="syncForm()">
        <option value="today">Journalier</option>
        <option value="week">Semaine</option>
        <option value="month">Mois</option>
        <option value="year">Année</option>
      </select>
      <div id="grpDate" class="hidden" style="margin-top:10px;">
        <label class="form-label">Date précise (optionnel)</label>
        <input type="date" id="fDate">
      </div>
    </div>

    <div class="form-group hidden" id="grpDeps">
      <label class="form-label">Dépendances</label>
      <label class="toggle-row">
        <input type="checkbox" id="fHasDeps" onchange="syncForm()">
        <span>Ajouter des objectifs parents</span>
      </label>
      <div id="parentListWrap" class="hidden">
        <div class="parent-list" id="parentList"></div>
      </div>
    </div>

    <div class="form-group hidden" id="grpRecur">
      <label class="form-label">Récurrence</label>
      <select id="fRecur" onchange="syncForm()">
        <option value="">Unique</option>
        <option value="Quotidien">Quotidien</option>
        <option value="Hebdomadaire">Hebdomadaire</option>
        <option value="Mensuel">Mensuel</option>
      </select>
      <div id="grpDays" class="hidden">
        <div class="days-row" id="daysRow">
          <div class="day-btn" data-d="1">L</div>
          <div class="day-btn" data-d="2">M</div>
          <div class="day-btn" data-d="3">Me</div>
          <div class="day-btn" data-d="4">J</div>
          <div class="day-btn" data-d="5">V</div>
          <div class="day-btn" data-d="6">S</div>
          <div class="day-btn" data-d="0">D</div>
        </div>
      </div>
      <div id="grpMonthDay" class="hidden" style="margin-top:10px;">
        <label class="form-label">Jour du mois (1–31)</label>
        <input type="number" id="fMonthDay" min="1" max="31" value="1">
      </div>
    </div>

    <div class="hidden" id="grpSubmitBtn" style="margin-top:4px;">
      <button class="btn-save" onclick="saveTask()">Enregistrer</button>
    </div>
    <button class="btn-cancel" onclick="closeModal()">Annuler</button>
  </div>
</div>

<script>
let tasks  = JSON.parse(localStorage.getItem('v28_tasks'))  || [];
let counts = JSON.parse(localStorage.getItem('v28_counts')) || {};
let selDays = [];

const COLS = [
  { id: 'today', label: "Aujourd'hui" },
  { id: 'week',  label: 'Cette semaine' },
  { id: 'month', label: 'Ce mois' },
  { id: 'year',  label: 'Cette année' },
];

const COL_COLOR = { today: '#7c6af7', week: '#5b9cf6', month: '#34d399', year: '#fbbf24' };

function save() {
  localStorage.setItem('v28_tasks',  JSON.stringify(tasks));
  localStorage.setItem('v28_counts', JSON.stringify(counts));
}

function timeLeft(s) {
  const n = new Date();
  if (s === 'today') return `${23 - n.getHours()}h ${59 - n.getMinutes()}m restantes`;
  if (s === 'week')  return `${7 - (n.getDay() || 7)} jours restants`;
  if (s === 'month') return `${new Date(n.getFullYear(), n.getMonth()+1, 0).getDate() - n.getDate()} jours restants`;
  return `${11 - n.getMonth()} mois restants`;
}

function taskVisible(t, id, now, tod, ws, we) {
  if (t.scope !== id) return false;
  if (!t.date && !t.recurrence) return true;
  if (t.date) {
    const d = new Date(t.date);
    if (id === 'today') return t.date === tod;
    if (id === 'week')  return d >= ws && d <= we;
    if (id === 'month') return d.getMonth() === now.getMonth();
    if (id === 'year')  return d.getFullYear() === now.getFullYear();
  }
  if (t.recurrence === 'Quotidien')    return true;
  if (t.recurrence === 'Hebdomadaire') return t.recurDays.includes(now.getDay());
  if (t.recurrence === 'Mensuel')      return now.getDate() == t.recurMonthDay;
  return true;
}

function parentProgress(t) {
  if (!t.requirements?.length) return 100;
  const n = t.requirements.reduce((a,r) => a + r.quota, 0);
  const g = t.requirements.reduce((a,r) => a + Math.min(counts[r.parentId]||0, r.quota), 0);
  return n ? (g/n)*100 : 100;
}

function isLocked(t) {
  return !t.completed && t.requirements?.some(r => (counts[r.parentId]||0) < r.quota);
}

// ── FONCTIONS DRAG & DROP ──
function initDragAndDrop() {
  const lists = document.querySelectorAll('.task-list');
  lists.forEach(list => {
    list.addEventListener('dragover', e => {
      e.preventDefault();
      const afterElement = getDragAfterElement(list, e.clientY);
      const dragging = document.querySelector('.dragging');
      if (afterElement == null) {
        list.appendChild(dragging);
      } else {
        list.insertBefore(dragging, afterElement);
      }
    });

    list.addEventListener('drop', e => {
      e.preventDefault();
      reorderTasks();
    });
  });
}

function getDragAfterElement(container, y) {
  const draggableElements = [...container.querySelectorAll('.task-card:not(.dragging)')];
  return draggableElements.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) {
      return { offset: offset, element: child };
    } else {
      return closest;
    }
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

function reorderTasks() {
  const newTasks = [];
  // On récupère toutes les cartes dans l'ordre du DOM pour reconstruire le tableau
  document.querySelectorAll('.task-card').forEach(el => {
    const id = el.dataset.id;
    const task = tasks.find(t => t.id === id);
    if (task) newTasks.push(task);
  });
  
  // On ajoute les tâches qui ne sont pas visibles actuellement (autres colonnes/filtres)
  tasks.forEach(t => {
    if (!newTasks.find(nt => nt.id === t.id)) {
      newTasks.push(t);
    }
  });

  tasks = newTasks;
  save();
}

function render() {
  const now = new Date();
  const tod = now.toISOString().split('T')[0];
  const ws  = new Date(now); ws.setDate(now.getDate() - (now.getDay()===0 ? 6 : now.getDay()-1));
  const we  = new Date(ws); we.setDate(ws.getDate()+6);

  document.getElementById('dateDisplay').textContent =
    now.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  COLS.forEach(col => {
    const c     = COL_COLOR[col.id];
    const vis   = tasks.filter(t => taskVisible(t, col.id, now, tod, ws, we));
    const done  = vis.filter(t => t.completed).length;
    const total = vis.length;
    const pct   = total ? Math.round(done/total*100) : 0;

    const R = 16, C = 2*Math.PI*R;
    const offset = C - (pct/100)*C;

    const items = total === 0
      ? `<div class="empty"><div class="empty-icon">✦</div>Aucun objectif</div>`
      : vis.map(t => {
          const prog   = parentProgress(t);
          const locked = isLocked(t);
          return `
            <li class="task-card${t.completed?' done':''}${locked?' locked':''}" 
                draggable="true" 
                data-id="${t.id}"
                ondragstart="this.classList.add('dragging')"
                ondragend="this.classList.remove('dragging')">
              <div class="task-top">
                <span class="recur-pill">${t.recurrence||'Unique'}</span>
                <button class="del-btn" onclick="deleteTask('${t.id}')">
                  <svg width="9" height="9" viewBox="0 0 9 9" fill="none">
                    <path d="M1 1l7 7M8 1L1 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                  </svg>
                </button>
              </div>
              <div class="task-body">
                <div class="check" onclick="toggleTask('${t.id}')"></div>
                <span class="task-text" onclick="openEditModal('${t.id}')">${t.text}</span>
              </div>
              ${t.requirements?.length ? `
                <div class="sub-prog">
                  <div class="sub-prog-fill" style="width:${prog}%;background:linear-gradient(90deg,${c},${c}99)"></div>
                </div>` : ''}
            </li>`;
        }).join('');

    grid.insertAdjacentHTML('beforeend', `
      <div class="col">
        <div class="col-header">
          <div class="col-top">
            <div class="col-label-wrap">
              <span class="col-title">${col.label}</span>
              <span class="time-left">${timeLeft(col.id)}</span>
            </div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
              <div class="ring-wrap">
                <svg width="42" height="42" viewBox="0 0 42 42">
                  <circle class="ring-bg" cx="21" cy="21" r="${R}"/>
                  <circle class="ring-fill" cx="21" cy="21" r="${R}"
                    stroke="${c}"
                    stroke-dasharray="${C.toFixed(2)}"
                    stroke-dashoffset="${offset.toFixed(2)}"/>
                </svg>
                <span class="ring-pct" style="color:${c}">${pct}%</span>
              </div>
              <span class="col-count">${done}/${total}</span>
            </div>
          </div>
          <div class="prog-track">
            <div class="prog-bar" style="width:${pct}%;background:${c}"></div>
          </div>
        </div>
        <ul class="task-list" data-scope="${col.id}">${items}</ul>
      </div>`);
  });

  initDragAndDrop();
  save();
}

function toggleTask(id) {
  const t = tasks.find(t => t.id===id);
  if (!t) return;
  if (isLocked(t)) return alert('Pré-requis insuffisants.');
  t.completed = !t.completed;
  counts[t.id] = (counts[t.id]||0) + (t.completed ? 1 : -1);
  if (t.completed) celebrate();
  render();
}

function celebrate() {
  const el = document.getElementById('bravo');
  el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1900);
  confetti({ particleCount:80, spread:90, origin:{y:.5}, colors:['#7c6af7','#5b9cf6','#34d399','#fbbf24','#fff'] });
}

function deleteTask(id) {
  if (!confirm('Supprimer cet objectif ?')) return;
  tasks = tasks.filter(t => t.id !== id);
  render();
}

function openModal(data=null) {
  document.getElementById('modalTitle').textContent = data ? "Modifier l'objectif" : 'Nouvel objectif';
  document.getElementById('editId').value    = data?.id   || '';
  document.getElementById('fName').value     = data?.text || '';
  document.getElementById('fScope').value    = data?.scope || 'today';
  document.getElementById('fDate').value     = data?.date  || '';
  document.getElementById('fRecur').value    = data?.recurrence || '';
  document.getElementById('fMonthDay').value = data?.recurMonthDay || 1;
  document.getElementById('fHasDeps').checked = !!(data?.requirements?.length);
  selDays = data?.recurDays ? [...data.recurDays] : [];
  document.querySelectorAll('.day-btn').forEach(b => b.classList.toggle('on', selDays.includes(+b.dataset.d)));
  buildParentList(data?.requirements||[]);
  syncForm();
  document.getElementById('overlay').style.display = 'flex';
}

function openEditModal(id) { openModal(tasks.find(t => t.id===id)); }
function closeModal()       { document.getElementById('overlay').style.display='none'; }

function syncForm() {
  const name   = document.getElementById('fName').value.trim();
  const scope  = document.getElementById('fScope').value;
  const recur  = document.getElementById('fRecur').value;
  const deps   = document.getElementById('fHasDeps').checked;
  const editId = document.getElementById('editId').value;
  const others = tasks.filter(t => t.id !== editId);

  toggle('grpScope',       name.length > 0);
  toggle('grpDate',        name.length > 0 && scope === 'today');
  toggle('grpDeps',        name.length > 0 && others.length > 0);
  toggle('parentListWrap', deps);
  toggle('grpRecur',       name.length > 0);
  toggle('grpDays',        recur === 'Hebdomadaire');
  toggle('grpMonthDay',    recur === 'Mensuel');
  toggle('grpSubmitBtn',   name.length > 0);
}

function toggle(id, show) { document.getElementById(id).classList.toggle('hidden', !show); }

function buildParentList(existing=[]) {
  const editId = document.getElementById('editId').value;
  document.getElementById('parentList').innerHTML = tasks
    .filter(t => t.id !== editId)
    .map(t => {
      const req = existing.find(r => r.parentId===t.id);
      return `<div class="parent-row">
        <input type="checkbox" class="pc" value="${t.id}" ${req?'checked':''}>
        <span>${t.text}</span>
        <input type="number" class="pq" value="${req?.quota||1}" min="1">
      </div>`;
    }).join('');
}

document.getElementById('daysRow').addEventListener('click', e => {
  const btn = e.target.closest('.day-btn');
  if (!btn) return;
  const d = +btn.dataset.d;
  btn.classList.toggle('on');
  selDays = btn.classList.contains('on') ? [...selDays,d] : selDays.filter(x=>x!==d);
});

function saveTask() {
  const id  = document.getElementById('editId').value;
  const reqs = document.getElementById('fHasDeps').checked
    ? Array.from(document.querySelectorAll('.parent-row'))
        .filter(r => r.querySelector('.pc').checked)
        .map(r => ({ parentId: r.querySelector('.pc').value, quota: +r.querySelector('.pq').value||1 }))
    : [];

  const t = {
    id:            id || 'T-'+Date.now(),
    text:          document.getElementById('fName').value.trim(),
    scope:         document.getElementById('fScope').value,
    date:          document.getElementById('fScope').value==='today' ? document.getElementById('fDate').value : '',
    recurrence:    document.getElementById('fRecur').value,
    recurDays:     [...selDays],
    recurMonthDay: +document.getElementById('fMonthDay').value,
    requirements:  reqs,
    completed:     id ? (tasks.find(x=>x.id===id)?.completed||false) : false,
  };

  tasks = id ? tasks.map(x => x.id===id ? t : x) : [...tasks, t];
  closeModal();
  render();
}

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});

render();
</script>
</body>
</html>
