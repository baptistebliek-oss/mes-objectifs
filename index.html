<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Performance Elite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
:root {
  --bg:        #0d0d0f;
  --s1:        #141416;
  --s2:        #1a1a1d;
  --s3:        #202024;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.04);
  --text:      #f0f0f2;
  --text2:     #8a8a96;
  --text3:     #46464f;
  --violet:    #7c6af7;
  --blue:      #5b9cf6;
  --green:     #34d399;
  --amber:     #fbbf24;
  --red:       #f87171;
  --font: 'Plus Jakarta Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 100px; }

/* ── TOPBAR ── */
.topbar {
  position: sticky; top: 0; z-index: 50; background: rgba(13,13,15,.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border2); padding: 0 28px; height: 64px; display: flex; align-items: center; justify-content: space-between;
}
.topbar-left { display: flex; align-items: center; gap: 14px; }
.logo { width: 32px; height: 32px; background: linear-gradient(135deg, var(--violet), var(--blue)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 800; color: #fff; }
.topbar-right { display: flex; align-items: center; gap: 16px; }
#dateDisplay { font-size: .75rem; font-weight: 500; color: var(--text3); }

.btn-cal-toggle {
  background: var(--s2); border: 1px solid var(--border); color: var(--text2); padding: 7px 14px; border-radius: 10px;
  font-size: 0.75rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s;
}
.btn-cal-toggle:hover { background: var(--s3); color: var(--text); }

/* ── GRID & COLUMNS ── */
.main { padding: 28px 20px; max-width: 1440px; margin: 0 auto; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; align-items: start; }
.col { background: var(--s1); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
.col-header { padding: 18px 18px 14px; border-bottom: 1px solid var(--border2); }
.col-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.col-title { font-size: .95rem; font-weight: 700; }
.ring-wrap { position: relative; width: 42px; height: 42px; transform: rotate(-90deg); }
.ring-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: .58rem; font-weight: 800; transform: rotate(90deg); }

/* ── CARDS ── */
.task-list { list-style: none; padding: 10px; display: flex; flex-direction: column; gap: 6px; min-height: 50px; }
.task-card { background: var(--s2); border: 1px solid var(--border2); border-radius: 14px; padding: 12px 13px; cursor: grab; transition: 0.2s; }
.task-card.dragging { opacity: 0.4; }
.task-card.done { background: rgba(52,211,153,.04); opacity: 0.7; }
.task-card.locked { opacity: 0.25; filter: grayscale(1); pointer-events: none; }
.task-text { font-size: .875rem; font-weight: 500; flex: 1; cursor: pointer; }
.task-card.done .task-text { text-decoration: line-through; color: var(--text3); }
.recur-pill { font-size: .55rem; font-weight: 700; text-transform: uppercase; color: var(--text3); background: var(--s3); padding: 2px 8px; border-radius: 99px; }

/* ── MODALS ── */
.overlay { position: fixed; inset: 0; background: rgba(5,5,8,.85); backdrop-filter: blur(15px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
.modal { background: var(--s1); border: 1px solid var(--border); border-radius: 24px; padding: 28px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }

/* ── CALENDAR SPECIFIC ── */
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 15px; }
.cal-cell { aspect-ratio: 1; background: var(--s2); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 600; border: 1px solid transparent; }
.cal-cell.today { border-color: var(--violet); color: var(--violet); background: rgba(124,106,247,0.05); }
.cal-day-label { font-size: 0.6rem; color: var(--text3); text-transform: uppercase; text-align: center; margin-bottom: 5px; }
.dot-row { display: flex; gap: 2px; margin-top: 3px; }
.dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text3); }

/* ── UPCOMING LIST IN CALENDAR ── */
.upcoming-section { margin-top: 30px; border-top: 1px solid var(--border2); pt: 20px; }
.upcoming-title { font-size: 0.75rem; font-weight: 800; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
.upcoming-item { display: flex; align-items: center; gap: 12px; padding: 10px; background: var(--s2); border-radius: 12px; margin-bottom: 6px; border: 1px solid var(--border2); }
.upcoming-date { font-size: 0.65rem; font-weight: 700; color: var(--violet); background: rgba(124,106,247,0.1); padding: 3px 8px; border-radius: 6px; min-width: 65px; text-align: center; }
.upcoming-name { font-size: 0.8rem; font-weight: 500; color: var(--text); }

.fab { position: fixed; bottom: 28px; right: 28px; width: 54px; height: 54px; background: linear-gradient(135deg, var(--violet), var(--blue)); border-radius: 16px; border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

#bravo { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 2000; opacity: 0; }
#bravo.show { animation: bravo 1.5s ease-out; }
@keyframes bravo { 0% { opacity:0; transform: scale(0.8); } 20% { opacity:1; transform: scale(1.1); } 80% { opacity:1; } 100% { opacity:0; } }
</style>
</head>
<body>

<div id="bravo"><h1 style="font-size: 5rem; font-weight: 900; background: linear-gradient(to right, var(--violet), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">BRAVO</h1></div>

<header class="topbar">
  <div class="topbar-left"><div class="logo">P</div><span class="topbar-title">Performance Elite</span></div>
  <div class="topbar-right">
    <span id="dateDisplay"></span>
    <button class="btn-cal-toggle" onclick="openCalendar()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        Calendrier
    </button>
  </div>
</header>

<main class="main">
  <div class="grid" id="mainGrid"></div>
</main>

<button class="fab" onclick="openModal()"><b>+</b></button>

<div class="overlay" id="taskOverlay">
  <div class="modal">
    <h3 style="margin-bottom: 20px;">Nouvel Objectif</h3>
    <input type="text" id="fName" placeholder="Titre de l'objectif..." style="width:100%; padding:12px; background:var(--s2); border:1px solid var(--border); border-radius:12px; color:white; margin-bottom:15px;">
    
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom:15px;">
        <select id="fScope" style="padding:10px; background:var(--s2); border:1px solid var(--border); border-radius:10px; color:white;">
            <option value="today">Aujourd'hui</option>
            <option value="week">Semaine</option>
            <option value="month">Mois</option>
        </select>
        <input type="date" id="fDate" style="padding:10px; background:var(--s2); border:1px solid var(--border); border-radius:10px; color:white;">
    </div>

    <button onclick="saveTask()" style="width:100%; padding:14px; background:var(--violet); color:white; border:none; border-radius:12px; font-weight:700; cursor:pointer;">Enregistrer l'objectif</button>
    <button onclick="closeModal()" style="width:100%; background:none; border:none; color:var(--text3); margin-top:10px; cursor:pointer;">Annuler</button>
  </div>
</div>

<div class="overlay" id="calOverlay">
  <div class="modal" style="max-width: 520px;">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <button onclick="changeMonth(-1)" style="background:none; border:none; color:var(--text3); cursor:pointer;">←</button>
        <h3 id="calMonthLabel">Mars 2024</h3>
        <button onclick="changeMonth(1)" style="background:none; border:none; color:var(--text3); cursor:pointer;">→</button>
    </div>

    <div class="cal-grid" id="calendarGrid"></div>

    <div class="upcoming-section">
        <div class="upcoming-title">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M12 2v20M2 12h20"/></svg>
            Échéances à venir
        </div>
        <div id="upcomingList">
            </div>
    </div>

    <button onclick="closeCalendar()" style="width:100%; margin-top:20px; padding:10px; background:var(--s2); border:1px solid var(--border); border-radius:12px; color:var(--text2); cursor:pointer;">Fermer la vue</button>
  </div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem('elite_tasks')) || [];
let currentCalDate = new Date();

const COLS = [
  { id: 'today', label: "Aujourd'hui", color: '#7c6af7' },
  { id: 'week', label: 'Semaine', color: '#5b9cf6' },
  { id: 'month', label: 'Mois', color: '#34d399' }
];

function save() { localStorage.setItem('elite_tasks', JSON.stringify(tasks)); }

function render() {
  const grid = document.getElementById('mainGrid');
  grid.innerHTML = '';
  document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('fr-FR', {day:'numeric', month:'long'});

  COLS.forEach(col => {
    const colTasks = tasks.filter(t => t.scope === col.id);
    const done = colTasks.filter(t => t.completed).length;
    const pct = colTasks.length ? Math.round((done/colTasks.length)*100) : 0;
    
    const items = colTasks.map(t => `
      <li class="task-card ${t.completed?'done':''}" draggable="true" data-id="${t.id}" ondragstart="this.classList.add('dragging')" ondragend="this.classList.remove('dragging')">
        <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
            <span class="recur-pill">${t.date || 'Unique'}</span>
            <button onclick="deleteTask('${t.id}')" style="background:none; border:none; color:var(--text3); cursor:pointer;">×</button>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
            <div onclick="toggleTask('${t.id}')" style="width:18px; height:18px; border:2px solid ${t.completed?col.color:'var(--s3)'}; border-radius:5px; background:${t.completed?col.color:'none'}; cursor:pointer;"></div>
            <span class="task-text">${t.text}</span>
        </div>
      </li>
    `).join('');

    grid.insertAdjacentHTML('beforeend', `
      <div class="col">
        <div class="col-header">
            <div class="col-top">
                <span class="col-title">${col.label}</span>
                <div class="ring-wrap">
                    <svg width="42" height="42"><circle cx="21" cy="21" r="16" fill="none" stroke="var(--s3)" stroke-width="3"/><circle cx="21" cy="21" r="16" fill="none" stroke="${col.color}" stroke-width="3" stroke-dasharray="100" stroke-dashoffset="${100-pct}"/></svg>
                    <div class="ring-pct" style="color:${col.color}">${pct}%</div>
                </div>
            </div>
        </div>
        <ul class="task-list" data-scope="${col.id}">${items || '<div style="text-align:center; padding:20px; color:var(--text3); font-size:0.7rem;">Aucun objectif</div>'}</ul>
      </div>
    `);
  });
  initDragEvents();
}

// ── CALENDRIER & PROCHAINS OBJECTIFS ──
function openCalendar() {
    document.getElementById('calOverlay').style.display = 'flex';
    renderCalendar();
    renderUpcoming();
}

function renderCalendar() {
    const grid = document.getElementById('calendarGrid');
    const label = document.getElementById('calMonthLabel');
    grid.innerHTML = '';
    
    const year = currentCalDate.getFullYear();
    const month = currentCalDate.getMonth();
    label.textContent = new Intl.DateTimeFormat('fr-FR', {month:'long', year:'numeric'}).format(currentCalDate);

    const firstDay = (new Date(year, month, 1).getDay() + 6) % 7;
    const days = new Date(year, month + 1, 0).getDate();

    ['L','M','M','J','V','S','D'].forEach(d => grid.insertAdjacentHTML('beforeend', `<div class="cal-day-label">${d}</div>`));
    for(let i=0; i<firstDay; i++) grid.insertAdjacentHTML('beforeend', `<div></div>`);
    
    for(let d=1; d<=days; d++) {
        const isToday = new Date().toDateString() === new Date(year, month, d).toDateString();
        const hasTask = tasks.some(t => t.date === `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
        grid.insertAdjacentHTML('beforeend', `
            <div class="cal-cell ${isToday?'today':''}">
                ${d}
                <div class="dot-row">${hasTask ? '<div class="dot" style="background:var(--violet)"></div>' : ''}</div>
            </div>
        `);
    }
}

function renderUpcoming() {
    const list = document.getElementById('upcomingList');
    list.innerHTML = '';

    // Filtrer les tâches avec date, non complétées, et trier par chronologie
    const upcoming = tasks
        .filter(t => t.date && !t.completed)
        .sort((a, b) => new Date(a.date) - new Date(b.date))
        .slice(0, 5); // On prend les 5 prochaines

    if(upcoming.length === 0) {
        list.innerHTML = '<div style="color:var(--text3); font-size:0.75rem; text-align:center; padding:10px;">Aucune échéance programmée</div>';
        return;
    }

    upcoming.forEach(t => {
        const d = new Date(t.date);
        const dateFmt = d.toLocaleDateString('fr-FR', {day:'2-digit', month:'short'});
        list.insertAdjacentHTML('beforeend', `
            <div class="upcoming-item">
                <div class="upcoming-date">${dateFmt}</div>
                <div class="upcoming-name">${t.text}</div>
            </div>
        `);
    });
}

// ── FONCTIONS GLOBALES ──
function initDragEvents() {
    document.querySelectorAll('.task-list').forEach(list => {
        list.addEventListener('dragover', e => {
            e.preventDefault();
            const dragging = document.querySelector('.dragging');
            list.appendChild(dragging);
        });
        list.addEventListener('drop', () => {
            const newOrder = [];
            document.querySelectorAll('.task-card').forEach(el => {
                newOrder.push(tasks.find(t => t.id === el.dataset.id));
            });
            tasks = newOrder; save();
        });
    });
}

function openModal() { document.getElementById('taskOverlay').style.display='flex'; }
function closeModal() { document.getElementById('taskOverlay').style.display='none'; }
function closeCalendar() { document.getElementById('calOverlay').style.display='none'; }
function changeMonth(v) { currentCalDate.setMonth(currentCalDate.getMonth()+v); renderCalendar(); }

function saveTask() {
    const text = document.getElementById('fName').value;
    if(!text) return;
    tasks.push({
        id: 'T'+Date.now(),
        text: text,
        scope: document.getElementById('fScope').value,
        date: document.getElementById('fDate').value,
        completed: false
    });
    save(); render(); closeModal();
}

function toggleTask(id) {
    const t = tasks.find(x => x.id === id);
    t.completed = !t.completed;
    if(t.completed) {
        document.getElementById('bravo').classList.add('show');
        setTimeout(() => document.getElementById('bravo').classList.remove('show'), 1500);
        confetti({particleCount:100, spread:70, origin:{y:0.6}, colors:['#7c6af7', '#34d399']});
    }
    save(); render();
}

function deleteTask(id) { tasks = tasks.filter(t => t.id !== id); save(); render(); }

render();
</script>
</body>
</html>
