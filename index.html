<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Elite v18 - Liberté Temporelle</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #050505; --card-bg: #111111; --text-main: #ffffff;
            --accent-red: #ff3c3c; --accent-gold: #ffbc00;
        }

        body { 
            font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; width: 100%; max-width: 1400px; padding-bottom: 120px; }
        .column { background: var(--card-bg); border-radius: 24px; padding: 24px; border: 1px solid rgba(255,255,255,0.05); }
        .column-title { font-size: 1.2rem; font-weight: 800; color: var(--accent-red); text-transform: uppercase; margin-bottom: 15px; display: block; }
        
        .progress-container { background: #1a1a1a; height: 4px; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; transition: width 0.5s ease; background: var(--accent-red); }

        ul { list-style: none; padding: 0; margin: 0; }
        .task-card { 
            background: linear-gradient(145deg, #181818, #141414); margin-bottom: 12px; padding: 16px; 
            border-radius: 16px; border: 1px solid rgba(255,255,255,0.03); transition: 0.3s;
        }
        .task-card.locked { opacity: 0.35; filter: grayscale(1); }
        
        .check-circle { width: 22px; height: 22px; border: 2px solid #333; border-radius: 50%; cursor: pointer; position: relative; flex-shrink: 0; }
        .task-card.completed .check-circle { background: var(--accent-red); border-color: var(--accent-red); }
        .task-card.completed .check-circle::after { content: '✓'; position: absolute; color: white; font-size: 14px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        
        .task-text { font-weight: 600; cursor: pointer; flex-grow: 1; }
        .date-badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; background: #222; color: #777; margin-top: 5px; display: inline-block; }
        .perm-badge { background: rgba(33, 150, 243, 0.1); color: #2196F3; }

        .stat-badge { font-size: 0.6rem; background: #222; color: #888; padding: 2px 6px; border-radius: 4px; }
        .requirement-list { margin-top: 10px; font-size: 0.7rem; color: var(--accent-gold); border-top: 1px solid rgba(255,188,0,0.1); padding-top: 8px; }
        .req-item { display: flex; justify-content: space-between; padding: 2px 0; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(10px); }
        .modal-content { background: #111; padding: 30px; border-radius: 24px; width: 90%; max-width: 480px; border: 1px solid #222; max-height: 85vh; overflow-y: auto; }
        input, select { width: 100%; background: #000; border: 1px solid #222; color: white; padding: 12px; border-radius: 10px; margin-bottom: 10px; }
        
        .parent-selector { background: #000; border: 1px solid #222; border-radius: 10px; padding: 10px; margin-bottom: 15px; }
        .parent-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 0.85rem; }
        .parent-row input[type="number"] { width: 60px; padding: 5px; margin-bottom: 0; text-align: center; }

        .btn-add { background: var(--accent-red); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .fab { position: fixed; bottom: 40px; right: 40px; width: 64px; height: 64px; background: var(--accent-red); border-radius: 20px; border: none; color: white; font-size: 32px; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>

<div id="taskModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle" style="color:var(--accent-red); margin-top:0;">CONFIGURATION</h2>
        <input type="hidden" id="editTaskId">
        <input type="text" id="taskName" placeholder="Titre de la mission...">
        
        <label style="font-size: 0.7rem; color: #555;">PORTÉE (COLONNE)</label>
        <select id="taskScope">
            <option value="today">Aujourd'hui</option>
            <option value="week">Semaine</option>
            <option value="month">Mois</option>
            <option value="year">Année</option>
        </select>

        <label style="font-size: 0.7rem; color: #555;">DATE (OPTIONNELLE)</label>
        <input type="date" id="taskDate">

        <label style="font-size: 0.7rem; color: #555;">DÉPENDANCES REQUIRES</label>
        <div class="parent-selector" id="parentList"></div>

        <label style="font-size: 0.7rem; color: #555;">RÉCURRENCE AUTOMATIQUE</label>
        <select id="taskRecur">
            <option value="">Unique</option>
            <option value="Quotidien">Quotidien</option>
            <option value="Hebdomadaire">Hebdomadaire</option>
            <option value="Mensuel">Mensuel</option>
            <option value="Annuel">Annuel</option>
        </select>

        <button class="btn-add" onclick="saveTask()">ENREGISTRER</button>
        <button style="width:100%; background:none; border:none; color:#444; margin-top:10px; cursor:pointer;" onclick="closeModal()">Annuler</button>
    </div>
</div>

<h1>PERFORMANCE ELITE v18</h1>
<div class="dashboard-grid" id="mainGrid"></div>
<button class="fab" onclick="openCreateModal()">+</button>

<script>
    let allTasks = JSON.parse(localStorage.getItem('v18_tasks')) || [];
    let totalCounts = JSON.parse(localStorage.getItem('v18_counts')) || {};
    let lastVisit = localStorage.getItem('v18_last_visit');
    const columns = [{ id: 'today', label: "Aujourd'hui" }, { id: 'week', label: "Semaine" }, { id: 'month', label: "Mois" }, { id: 'year', label: "Année" }];

    function openCreateModal() {
        document.getElementById('modalTitle').innerText = "NOUVEAU PLAN";
        document.getElementById('editTaskId').value = "";
        document.getElementById('taskName').value = "";
        document.getElementById('taskDate').value = ""; // Vide par défaut
        renderParentList();
        document.getElementById('taskModal').style.display = 'flex';
    }

    function openEditModal(id) {
        const task = allTasks.find(t => t.id === id);
        if(!task) return;
        document.getElementById('modalTitle').innerText = "MODIFICATION";
        document.getElementById('editTaskId').value = id;
        document.getElementById('taskName').value = task.text;
        document.getElementById('taskDate').value = task.date || "";
        document.getElementById('taskScope').value = task.scope || 'today';
        document.getElementById('taskRecur').value = task.recurrence || "";
        renderParentList(task.requirements || []);
        document.getElementById('taskModal').style.display = 'flex';
    }

    function renderParentList(existingReqs = []) {
        const list = document.getElementById('parentList');
        list.innerHTML = '';
        const currentId = document.getElementById('editTaskId').value;
        allTasks.filter(t => t.id !== currentId).forEach(t => {
            const req = existingReqs.find(r => r.parentId === t.id);
            list.innerHTML += `
                <div class="parent-row">
                    <input type="checkbox" class="parent-check" value="${t.id}" ${req ? 'checked' : ''}>
                    <span style="flex-grow:1">${t.text}</span>
                    <input type="number" class="parent-quota" value="${req ? req.quota : 1}" min="1">
                </div>`;
        });
    }

    function closeModal() { document.getElementById('taskModal').style.display = 'none'; }

    function saveTask() {
        const id = document.getElementById('editTaskId').value;
        const name = document.getElementById('taskName').value.trim();
        const date = document.getElementById('taskDate').value;
        const scope = document.getElementById('taskScope').value;
        const recur = document.getElementById('taskRecur').value;
        const reqs = Array.from(document.querySelectorAll('.parent-row')).filter(r => r.querySelector('.parent-check').checked).map(r => ({
            parentId: r.querySelector('.parent-check').value,
            quota: parseInt(r.querySelector('.parent-quota').value) || 1
        }));

        if (!name) return;

        if (id) {
            let task = allTasks.find(t => t.id === id);
            Object.assign(task, { text: name, date, scope, recurrence: recur, requirements: reqs });
        } else {
            allTasks.push({ id: "T-"+Date.now(), text: name, date, scope, recurrence: recur, requirements: reqs, completed: false });
        }
        closeModal();
        updateUI();
    }

    function toggleTask(id) {
        const task = allTasks.find(t => t.id === id);
        if (task.requirements?.some(req => (totalCounts[req.parentId] || 0) < req.quota) && !task.completed) {
            alert("Quotas non atteints !"); return;
        }
        task.completed = !task.completed;
        if(task.completed) {
            totalCounts[task.id] = (totalCounts[task.id] || 0) + 1;
            confetti({ particleCount: 80, origin: { y: 0.8 } });
        } else {
            totalCounts[task.id] = Math.max(0, (totalCounts[task.id] || 0) - 1);
        }
        updateUI();
    }

    function updateUI() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';
        const now = new Date();
        const todayStr = now.toISOString().split('T')[0];
        const startOfWeek = new Date(now);
        startOfWeek.setDate(now.getDate() - (now.getDay() === 0 ? 6 : now.getDay() - 1));
        const endOfWeek = new Date(startOfWeek); endOfWeek.setDate(startOfWeek.getDate() + 6);

        columns.forEach(col => {
            let filtered = allTasks.filter(t => {
                if (t.scope !== col.id) return false;
                if (!t.date) return true; // Les permanents sont toujours visibles dans leur scope
                
                const tDate = new Date(t.date);
                if (col.id === 'today') return t.date === todayStr;
                if (col.id === 'week') return tDate >= startOfWeek && tDate <= endOfWeek;
                if (col.id === 'month') return tDate.getMonth() === now.getMonth() && tDate.getFullYear() === now.getFullYear();
                if (col.id === 'year') return tDate.getFullYear() === now.getFullYear();
                return false;
            });

            const percent = filtered.length ? Math.round((filtered.filter(tk=>tk.completed).length / filtered.length)*100) : 0;
            let listHtml = '';

            filtered.forEach(tk => {
                let isLocked = tk.requirements?.some(req => (totalCounts[req.parentId] || 0) < req.quota);
                listHtml += `
                    <li class="task-card ${tk.completed ? 'completed' : ''} ${isLocked && !tk.completed ? 'locked' : ''}">
                        <div style="display:flex; justify-content:space-between; align-items:center">
                            <span class="badge" style="font-size:0.6rem; color:#555">${tk.recurrence || 'UNIQUE'}</span>
                            <div style="display:flex; align-items:center; gap:8px">
                                <span class="stat-badge">Σ ${totalCounts[tk.id]||0}</span>
                                <button onclick="deleteTask('${tk.id}')" style="background:none; border:none; color:#333; cursor:pointer;">×</button>
                            </div>
                        </div>
                        <div style="display:flex; align-items:center; gap:12px; margin-top:8px">
                            <div class="check-circle" onclick="toggleTask('${tk.id}')"></div>
                            <span class="task-text" onclick="openEditModal('${tk.id}')">${tk.text}</span>
                        </div>
                        <div class="date-badge ${!tk.date ? 'perm-badge' : ''}">${tk.date || 'OBJECTIF PERMANENT'}</div>
                        ${tk.requirements?.length > 0 ? `<div class="requirement-list">${tk.requirements.map(r => {
                            const p = allTasks.find(at => at.id === r.parentId);
                            return `<div class="req-item"><span>${p?p.text:'?'}</span> <span>${totalCounts[r.parentId]||0}/${r.quota}</span></div>`;
                        }).join('')}</div>` : ''}
                    </li>`;
            });

            grid.innerHTML += `
                <div class="column">
                    <span class="column-title">${col.label}</span>
                    <div class="progress-container"><div class="progress-bar" style="width:${percent}%"></div></div>
                    <ul>${listHtml}</ul>
                </div>`;
        });

        localStorage.setItem('v18_tasks', JSON.stringify(allTasks));
        localStorage.setItem('v18_counts', JSON.stringify(totalCounts));
    }

    function deleteTask(id) { if(confirm("Supprimer ?")) { allTasks = allTasks.filter(t => t.id !== id); updateUI(); } }

    function checkReset() {
        const now = new Date();
        const todayStr = now.toISOString().split('T')[0];
        if (lastVisit && lastVisit !== todayStr) {
            const lastDate = new Date(lastVisit);
            allTasks.forEach(task => {
                if (task.recurrence === "Quotidien") task.completed = false;
                else if (task.recurrence === "Hebdomadaire" && (now.getDay() === 1)) task.completed = false;
                else if (task.recurrence === "Mensuel" && (now.getMonth() !== lastDate.getMonth())) task.completed = false;
                else if (task.recurrence === "Annuel" && (now.getFullYear() !== lastDate.getFullYear())) task.completed = false;
            });
        }
        localStorage.setItem('v18_last_visit', todayStr);
    }

    checkReset();
    updateUI();
</script>
</body>
</html>
