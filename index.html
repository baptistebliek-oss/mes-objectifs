<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Elite v11 - Architecte</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #050505; --card-bg: #111111; --text-main: #ffffff; --text-dim: #777;
            --accent-red: #ff3c3c; --accent-red-dim: rgba(255, 60, 60, 0.1);
            --cat-sport: #4CAF50; --cat-travail: #2196F3; --cat-perso: #FFEB3B; --cat-finance: #9C27B0; --cat-autre: #555;
        }

        body { 
            font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* DASHBOARD GRID */
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; width: 100%; max-width: 1400px; padding-bottom: 120px; }
        .column { background: var(--card-bg); border-radius: 24px; padding: 24px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; }
        .column-title { font-size: 1.3rem; font-weight: 800; color: var(--accent-red); text-transform: uppercase; }
        
        .progress-container { background: #1a1a1a; height: 4px; flex-grow: 1; border-radius: 10px; margin-right: 15px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; transition: width 0.5s ease; }

        /* TASK CARDS */
        ul { list-style: none; padding: 0; margin: 0; }
        .task-card { 
            background: linear-gradient(145deg, #181818, #141414); margin-bottom: 12px; padding: 16px; 
            border-radius: 16px; border: 1px solid rgba(255,255,255,0.03); transition: 0.3s;
        }
        .task-card.locked { opacity: 0.4; cursor: not-allowed; filter: grayscale(0.8); }
        .task-card.completed { border-color: transparent; }
        
        .check-circle { width: 22px; height: 22px; border: 2px solid #333; border-radius: 50%; cursor: pointer; position: relative; flex-shrink: 0; }
        .task-card.completed .check-circle { background: var(--accent-red); border-color: var(--accent-red); }
        .task-card.completed .check-circle::after { content: '✓'; position: absolute; color: white; font-size: 14px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .task-card.locked .check-circle { border-style: dashed; cursor: not-allowed; }
        .task-card.locked .check-circle::after { content: '🔒'; font-size: 10px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .badge { font-size: 0.6rem; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; font-weight: 800; }
        .dep-badge { background: #333; color: #aaa; font-size: 0.6rem; padding: 3px 8px; border-radius: 6px; }

        /* MODAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 500; backdrop-filter: blur(10px); }
        .modal-content { background: #111; padding: 30px; border-radius: 24px; width: 90%; max-width: 450px; border: 1px solid #222; }
        input, select { width: 100%; background: #000; border: 1px solid #222; color: white; padding: 12px; border-radius: 10px; margin-bottom: 15px; }
        .btn-add { background: var(--accent-red); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* FAB & HEATMAP */
        .fab { position: fixed; bottom: 40px; right: 40px; width: 64px; height: 64px; background: var(--accent-red); border-radius: 20px; border: none; color: white; font-size: 32px; cursor: pointer; z-index: 100; }
        .mini-history { display: flex; align-items: center; gap: 10px; background: #000; padding: 10px 20px; border-radius: 50px; margin-bottom: 20px; border: 1px solid #222; }
        .day-sq { width: 10px; height: 10px; border-radius: 2px; background: #1a1a1a; }
    </style>
</head>
<body>

<div id="addModal" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--accent-red)">NOUVELLE MISSION</h2>
        <input type="text" id="taskName" placeholder="Nom de l'objectif...">
        <label style="font-size: 0.7rem; color: #555;">COLONNE</label>
        <select id="taskTarget">
            <option value="journalier">Aujourd'hui</option>
            <option value="hebdomadaire">Hebdo</option>
            <option value="mensuel">Mensuel</option>
            <option value="annuel">Annuel</option>
        </select>
        <label style="font-size: 0.7rem; color: #555;">DÉPENDANCE (Optionnel)</label>
        <select id="taskParent">
            <option value="">Aucune dépendance</option>
        </select>
        <label style="font-size: 0.7rem; color: #555;">RÉCURRENCE</label>
        <select id="taskRecur">
            <option value="">Une fois</option>
            <option value="Quotidien">Quotidien</option>
            <option value="Hebdomadaire">Hebdo</option>
            <option value="Mensuel">Mensuel</option>
            <option value="Annuel">Annuel</option>
        </select>
        <button class="btn-add" onclick="createNewTask()">CRÉER</button>
        <button style="width:100%; background:none; border:none; color:#444; margin-top:10px; cursor:pointer;" onclick="toggleModal(false)">Annuler</button>
    </div>
</div>

<h1>PERFORMANCE ELITE v11</h1>

<div class="mini-history">
    <div id="miniHeatmap" style="display:flex; gap:4px"></div>
</div>

<div class="dashboard-grid" id="mainGrid"></div>

<button class="fab" onclick="toggleModal(true)">+</button>

<script>
    let allData = JSON.parse(localStorage.getItem('v11_data')) || { journalier: [], hebdomadaire: [], mensuel: [], annuel: [] };
    let historyData = JSON.parse(localStorage.getItem('v11_history')) || {};
    let lastVisit = localStorage.getItem('v11_last_visit');
    const types = [{id:'journalier', label:"Aujourd'hui"}, {id:'hebdomadaire', label:"Hebdo"}, {id:'mensuel', label:"Mensuel"}, {id:'annuel', label:"Annuel"}];

    function toggleModal(show) {
        if(show) {
            const sel = document.getElementById('taskParent');
            sel.innerHTML = '<option value="">Aucune dépendance</option>';
            Object.values(allData).flat().forEach(t => {
                sel.innerHTML += `<option value="${t.id}">${t.text} (${t.recurrence || 'Unique'})</option>`;
            });
            document.getElementById('addModal').style.display = 'flex';
        } else {
            document.getElementById('addModal').style.display = 'none';
        }
    }

    function createNewTask() {
        const name = document.getElementById('taskName').value.trim();
        const target = document.getElementById('taskTarget').value;
        const parentId = document.getElementById('taskParent').value;
        const recur = document.getElementById('taskRecur').value;
        if (!name) return;
        allData[target].push({ id: Date.now(), text: name, parentId: parentId || null, recurrence: recur, completed: false });
        toggleModal(false);
        updateUI();
    }

    function toggleTask(type, id) {
        const task = allData[type].find(t => t.id === id);
        
        // Vérification de la dépendance
        if (task.parentId) {
            const parent = Object.values(allData).flat().find(p => p.id == task.parentId);
            if (parent && !parent.completed) {
                alert("Mission verrouillée ! Vous devez d'abord valider : " + parent.text);
                return;
            }
        }

        let newState = !task.completed;
        task.completed = newState;

        if(newState) {
            confetti({ particleCount: 80, spread: 50, origin: { y: 0.8 }, colors: ['#ff3c3c'] });
            // Liaison par nom (v10)
            if(type === "journalier") {
                types.forEach(col => {
                    if(col.id !== "journalier") {
                        allData[col.id].forEach(t => {
                            if(t.text.toLowerCase() === task.text.toLowerCase()) t.completed = true;
                        });
                    }
                });
            }
        }
        updateUI();
    }

    function updateUI() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';
        types.forEach(t => {
            const tasks = allData[t.id];
            const percent = tasks.length ? Math.round((tasks.filter(tk=>tk.completed).length / tasks.length)*100) : 0;
            
            let listHtml = '';
            tasks.forEach(tk => {
                let isLocked = false;
                let parentName = "";
                if(tk.parentId) {
                    const p = Object.values(allData).flat().find(parent => parent.id == tk.parentId);
                    if(p && !p.completed) isLocked = true;
                    if(p) parentName = p.text;
                }

                listHtml += `
                    <li class="task-card ${tk.completed ? 'completed' : ''} ${isLocked ? 'locked' : ''}">
                        <div style="display:flex; justify-content:space-between; margin-bottom:8px">
                            <span class="badge" style="background:#444">${tk.recurrence || 'Unique'}</span>
                            <button onclick="deleteTask('${t.id}', ${tk.id})" style="background:none; border:none; color:#555; cursor:pointer">×</button>
                        </div>
                        <div style="display:flex; align-items:center; gap:12px">
                            <div class="check-circle" onclick="toggleTask('${t.id}', ${tk.id})"></div>
                            <span onclick="toggleTask('${t.id}', ${tk.id})">${tk.text}</span>
                        </div>
                        ${tk.parentId ? `<div style="margin-top:8px"><span class="dep-badge">Requis: ${parentName}</span></div>` : ''}
                    </li>
                `;
            });

            grid.innerHTML += `
                <div class="column">
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <span class="column-title">${t.label}</span>
                        <span style="color:var(--accent-red); font-weight:bold">${percent}%</span>
                    </div>
                    <div class="progress-container" style="margin: 10px 0 20px 0"><div class="progress-bar" style="width:${percent}%; background:var(--accent-red)"></div></div>
                    <ul>${listHtml}</ul>
                </div>
            `;
        });
        localStorage.setItem('v11_data', JSON.stringify(allData));
        renderMiniHeatmap();
    }

    function deleteTask(type, id) {
        allData[type] = allData[type].filter(t => t.id !== id);
        updateUI();
    }

    function renderMiniHeatmap() {
        const mini = document.getElementById('miniHeatmap'); mini.innerHTML = '';
        const today = new Date().toISOString().split('T')[0];
        let total = 0, comp = 0;
        Object.values(allData).forEach(arr => { total += arr.length; comp += arr.filter(t=>t.completed).length; });
        historyData[today] = total === 0 ? 0 : Math.round((comp/total)*100);
        localStorage.setItem('v11_history', JSON.stringify(historyData));
        for (let i = 20; i >= 0; i--) {
            const d = new Date(); d.setDate(d.getDate() - i);
            const val = historyData[d.toISOString().split('T')[0]] || 0;
            const sq = document.createElement('div');
            sq.className = 'day-sq';
            if(val > 0) sq.style.background = `hsl(0, 100%, ${val/2}%)`;
            mini.appendChild(sq);
        }
    }

    function checkReset() {
        const now = new Date();
        const todayStr = now.toISOString().split('T')[0];
        if (lastVisit && lastVisit !== todayStr) {
            const lastDate = new Date(lastVisit);
            Object.keys(allData).forEach(col => {
                allData[col] = allData[col].filter(task => {
                    if (task.recurrence === "Quotidien") { task.completed = false; return true; }
                    if (task.recurrence === "Hebdomadaire" && (now.getDay() === 1 || (now - lastDate > 604800000))) { task.completed = false; return true; }
                    if (task.recurrence === "Mensuel" && (now.getMonth() !== lastDate.getMonth())) { task.completed = false; return true; }
                    if (task.recurrence === "Annuel" && (now.getFullYear() !== lastDate.getFullYear())) { task.completed = false; return true; }
                    return !task.completed;
                });
            });
        }
        localStorage.setItem('v11_last_visit', todayStr);
    }

    checkReset();
    updateUI();
</script>
</body>
</html>
