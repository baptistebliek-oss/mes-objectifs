<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Elite v28 - Restauration Totale</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #050505; --card-bg: #111111; --text-main: #ffffff;
            --accent-red: #ff3c3c; --accent-gold: #ffbc00; --accent-green: #00ff88;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; width: 100%; max-width: 1400px; padding-bottom: 120px; }
        .column { background: var(--card-bg); border-radius: 24px; padding: 24px; border: 1px solid rgba(255,255,255,0.05); }
        .column-title { font-size: 1.2rem; font-weight: 800; color: var(--accent-red); text-transform: uppercase; margin-bottom: 5px; display: block; }
        
        .time-left { font-size: 0.75rem; color: #555; margin-bottom: 15px; font-weight: 500; }
        .progress-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; }
        .progress-percent { font-size: 0.8rem; font-weight: 700; color: #777; }
        .progress-container { background: #1a1a1a; height: 6px; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { height: 100%; transition: width 0.8s ease; background: linear-gradient(90deg, var(--accent-red), var(--accent-gold), var(--accent-green)); background-size: 1000px; }

        ul { list-style: none; padding: 0; margin: 0; }
        .task-card { background: linear-gradient(145deg, #181818, #141414); margin-bottom: 12px; padding: 16px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.03); position: relative; transition: 0.3s;}
        .task-card.locked { opacity: 0.35; filter: grayscale(1); pointer-events: none; }
        
        .check-circle { width: 22px; height: 22px; border: 2px solid #333; border-radius: 50%; cursor: pointer; position: relative; flex-shrink: 0; }
        .task-card.completed .check-circle { background: var(--accent-red); border-color: var(--accent-red); }
        .task-card.completed .check-circle::after { content: '✓'; position: absolute; color: white; font-size: 14px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        
        .parent-progress-mini { height: 4px; background: #222; border-radius: 2px; margin-top: 10px; overflow: hidden; width: 100%; }
        .parent-progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-red), var(--accent-gold), var(--accent-green)); background-size: 400px; transition: width 0.5s ease; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(10px); }
        .modal-content { background: #111; padding: 30px; border-radius: 24px; width: 90%; max-width: 480px; border: 1px solid #222; max-height: 85vh; overflow-y: auto; }
        .form-step { display: none; margin-bottom: 20px; animation: fadeIn 0.4s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        input, select { width: 100%; background: #000; border: 1px solid #222; color: white; padding: 12px; border-radius: 10px; margin-top: 5px; }
        .toggle-container { display: flex; align-items: center; gap: 10px; background: #000; padding: 12px; border-radius: 10px; border: 1px solid #222; cursor: pointer; margin-top: 10px;}
        
        .days-selector { display: flex; gap: 5px; margin-top: 10px; justify-content: space-between; }
        .day-btn { flex: 1; padding: 8px 0; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; color: #555; cursor: pointer; text-align: center; font-size: 0.7rem; }
        .day-btn.active { background: var(--accent-red); color: white; border-color: var(--accent-red); }

        .btn-add { background: var(--accent-red); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .fab { position: fixed; bottom: 40px; right: 40px; width: 64px; height: 64px; background: var(--accent-red); border-radius: 20px; color: white; font-size: 32px; cursor: pointer; z-index: 100; border: none; }
        .stat-badge { background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 6px; font-size: 0.7rem; color: var(--accent-gold); }
        .parent-selector { background: #080808; border: 1px solid #222; border-radius: 10px; padding: 10px; margin-top: 10px; }
        .parent-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 0.85rem; }
        .parent-row input[type="number"] { width: 60px; padding: 5px; text-align: center; margin-top: 0; }
    </style>
</head>
<body>

<div id="taskModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle" style="color:var(--accent-red); margin:0 0 20px 0;">OBJECTIF ELITE</h2>
        <input type="hidden" id="editTaskId">
        
        <div class="form-step" id="step-name" style="display:block;">
            <label>NOM DE L'OBJECTIF</label>
            <input type="text" id="taskName" oninput="checkSteps()" placeholder="Titre...">
        </div>

        <div class="form-step" id="step-scope">
            <label>PORTÉE</label>
            <select id="taskScope" onchange="checkSteps()">
                <option value="today">Journalier</option>
                <option value="week">Semaine</option>
                <option value="month">Mois</option>
                <option value="year">Année</option>
            </select>
            <div id="dateWrapper" style="display:none; margin-top:15px;">
                <label>DATE PRÉCISE (OPTIONNEL)</label>
                <input type="date" id="taskDate">
            </div>
        </div>

        <div class="form-step" id="step-dep-toggle">
            <label class="toggle-container">
                <input type="checkbox" id="hasDeps" onchange="checkSteps()">
                <span>AJOUTER DES PARENTS</span>
            </label>
            <div id="parentListWrapper" style="display:none;"><div class="parent-selector" id="parentList"></div></div>
        </div>

        <div class="form-step" id="step-recur">
            <label>RÉCURRENCE</label>
            <select id="taskRecur" onchange="checkSteps()">
                <option value="">UNIQUE</option>
                <option value="Quotidien">QUOTIDIEN</option>
                <option value="Hebdomadaire">HEBDOMADAIRE</option>
                <option value="Mensuel">MENSUEL</option>
            </select>
            <div id="recurDays" style="display:none; margin-top:10px;">
                <div class="days-selector">
                    <div class="day-btn" data-day="1" onclick="toggleDay(this, 1)">L</div>
                    <div class="day-btn" data-day="2" onclick="toggleDay(this, 2)">M</div>
                    <div class="day-btn" data-day="3" onclick="toggleDay(this, 3)">Me</div>
                    <div class="day-btn" data-day="4" onclick="toggleDay(this, 4)">J</div>
                    <div class="day-btn" data-day="5" onclick="toggleDay(this, 5)">V</div>
                    <div class="day-btn" data-day="6" onclick="toggleDay(this, 6)">S</div>
                    <div class="day-btn" data-day="0" onclick="toggleDay(this, 0)">D</div>
                </div>
            </div>
            <div id="recurMonth" style="display:none; margin-top:10px;">
                <label>JOUR DU MOIS (1-31)</label>
                <input type="number" id="recurMonthDay" min="1" max="31" value="1">
            </div>
        </div>

        <div class="form-step" id="step-submit">
            <button class="btn-add" onclick="saveTask()">DÉPLOYER</button>
        </div>
        <button style="width:100%; background:none; border:none; color:#444; margin-top:15px; cursor:pointer;" onclick="closeModal()">ANNULER</button>
    </div>
</div>

<h1 id="currentDateDisplay" style="font-size:0.9rem; color:#444; letter-spacing:2px; margin-bottom:15px;">...</h1>
<div class="dashboard-grid" id="mainGrid"></div>
<button class="fab" onclick="openCreateModal()">+</button>

<script>
    let allTasks = JSON.parse(localStorage.getItem('v28_tasks')) || [];
    let totalCounts = JSON.parse(localStorage.getItem('v28_counts')) || {};
    let selectedDays = [];

    const columns = [
        { id: 'today', label: "Journalier" },
        { id: 'week', label: "Semaine" },
        { id: 'month', label: "Mois" },
        { id: 'year', label: "Année" }
    ];

    function toggleDay(btn, day) {
        btn.classList.toggle('active');
        if(btn.classList.contains('active')) selectedDays.push(day);
        else selectedDays = selectedDays.filter(d => d !== day);
    }

    function checkSteps() {
        const name = document.getElementById('taskName').value.trim();
        const scope = document.getElementById('taskScope').value;
        const recur = document.getElementById('taskRecur').value;
        const hasDeps = document.getElementById('hasDeps').checked;
        const currentId = document.getElementById('editTaskId').value;
        
        document.getElementById('step-scope').style.display = name.length > 0 ? 'block' : 'none';
        document.getElementById('dateWrapper').style.display = (name.length > 0 && scope === 'today') ? 'block' : 'none';
        if (name.length > 0) {
            const others = allTasks.filter(t => t.id !== currentId);
            document.getElementById('step-dep-toggle').style.display = others.length > 0 ? 'block' : 'none';
            document.getElementById('parentListWrapper').style.display = hasDeps ? 'block' : 'none';
            document.getElementById('step-recur').style.display = 'block';
            document.getElementById('recurDays').style.display = (recur === 'Hebdomadaire') ? 'block' : 'none';
            document.getElementById('recurMonth').style.display = (recur === 'Mensuel') ? 'block' : 'none';
            document.getElementById('step-submit').style.display = 'block';
        }
    }

    function getTimeLeft(scope) {
        const now = new Date();
        if (scope === 'today') return `Reste ${23 - now.getHours()}h ${59 - now.getMinutes()}m`;
        if (scope === 'week') return `Reste ${7 - (now.getDay()||7)} jours`;
        if (scope === 'month') return `Reste ${new Date(now.getFullYear(), now.getMonth()+1, 0).getDate() - now.getDate()} j`;
        return `Reste ${11 - now.getMonth()} mois`;
    }

    function renderParentList(existingReqs = []) {
        const list = document.getElementById('parentList');
        list.innerHTML = '';
        allTasks.filter(t => t.id !== document.getElementById('editTaskId').value).forEach(t => {
            const req = existingReqs.find(r => r.parentId === t.id);
            list.innerHTML += `<div class="parent-row"><input type="checkbox" class="parent-check" value="${t.id}" ${req?'checked':''}><span>${t.text}</span><input type="number" class="parent-quota" value="${req?req.quota:1}" min="1"></div>`;
        });
    }

    function openCreateModal() {
        document.getElementById('editTaskId').value = "";
        document.getElementById('taskName').value = "";
        document.getElementById('taskScope').value = "today";
        document.getElementById('taskRecur').value = "";
        document.getElementById('hasDeps').checked = false;
        selectedDays = [];
        document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
        renderParentList();
        checkSteps();
        document.getElementById('taskModal').style.display = 'flex';
    }

    function saveTask() {
        const id = document.getElementById('editTaskId').value;
        const taskData = {
            id: id || "T-"+Date.now(),
            text: document.getElementById('taskName').value,
            scope: document.getElementById('taskScope').value,
            date: (document.getElementById('taskScope').value === 'today') ? document.getElementById('taskDate').value : "",
            recurrence: document.getElementById('taskRecur').value,
            recurDays: [...selectedDays],
            recurMonthDay: document.getElementById('recurMonthDay').value,
            requirements: document.getElementById('hasDeps').checked ? Array.from(document.querySelectorAll('.parent-row')).filter(r => r.querySelector('.parent-check').checked).map(r => ({
                parentId: r.querySelector('.parent-check').value,
                quota: parseInt(r.querySelector('.parent-quota').value) || 1
            })) : [],
            completed: false
        };
        if (id) allTasks = allTasks.map(t => t.id === id ? taskData : t);
        else allTasks.push(taskData);
        closeModal(); updateUI();
    }

    function toggleTask(id) {
        const task = allTasks.find(t => t.id === id);
        const isLocked = task.requirements?.some(req => (totalCounts[req.parentId] || 0) < req.quota);
        if (isLocked && !task.completed) return alert("Pré-requis insuffisants.");
        task.completed = !task.completed;
        totalCounts[task.id] = (totalCounts[task.id] || 0) + (task.completed ? 1 : -1);
        if(task.completed) confetti({ particleCount: 60 });
        updateUI();
    }

    function updateUI() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';
        const now = new Date();
        const todayStr = now.toISOString().split('T')[0];
        document.getElementById('currentDateDisplay').innerText = now.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' }).toUpperCase();

        const startOfWeek = new Date(now); startOfWeek.setDate(now.getDate() - (now.getDay() === 0 ? 6 : now.getDay() - 1));
        const endOfWeek = new Date(startOfWeek); endOfWeek.setDate(startOfWeek.getDate() + 6);

        columns.forEach(col => {
            let filtered = allTasks.filter(t => {
                if (t.scope !== col.id) return false;
                // Logique de filtrage simplifiée et robuste
                if (!t.date && !t.recurrence) return true; // Permanent
                if (t.date) {
                    const d = new Date(t.date);
                    if (col.id === 'today') return t.date === todayStr;
                    if (col.id === 'week') return d >= startOfWeek && d <= endOfWeek;
                    if (col.id === 'month') return d.getMonth() === now.getMonth();
                    if (col.id === 'year') return d.getFullYear() === now.getFullYear();
                }
                if (t.recurrence === 'Quotidien') return true;
                if (t.recurrence === 'Hebdomadaire') return t.recurDays.includes(now.getDay());
                if (t.recurrence === 'Mensuel') return now.getDate() == t.recurMonthDay;
                return true;
            });

            const percent = filtered.length ? Math.round((filtered.filter(tk=>tk.completed).length / filtered.length)*100) : 0;
            
            let listHtml = filtered.map(tk => {
                let parentProg = 100;
                if(tk.requirements?.length > 0) {
                    const totalNeeded = tk.requirements.reduce((acc, r) => acc + r.quota, 0);
                    const totalGot = tk.requirements.reduce((acc, r) => acc + Math.min(totalCounts[r.parentId]||0, r.quota), 0);
                    parentProg = (totalGot / totalNeeded) * 100;
                }
                const isLocked = tk.requirements?.some(r => (totalCounts[r.parentId]||0) < r.quota) && !tk.completed;

                return `
                <li class="task-card ${tk.completed ? 'completed' : ''} ${isLocked ? 'locked' : ''}">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:0.6rem; color:#555;">${tk.recurrence || 'UNIQUE'}</span>
                        <div style="display:flex; gap:8px; align-items:center;">
                            <span class="stat-badge">Σ ${totalCounts[tk.id]||0}</span>
                            <button onclick="deleteTask('${tk.id}')" style="background:none; border:none; color:#333; cursor:pointer;">×</button>
                        </div>
                    </div>
                    <div style="display:flex; align-items:center; gap:12px; margin-top:8px">
                        <div class="check-circle" onclick="toggleTask('${tk.id}')"></div>
                        <span class="task-text" onclick="openEditModal('${tk.id}')">${tk.text}</span>
                    </div>
                    ${tk.requirements?.length > 0 ? `
                        <div class="parent-progress-mini">
                            <div class="parent-progress-fill" style="width:${parentProg}%"></div>
                        </div>
                    ` : ''}
                </li>`;
            }).join('');

            grid.innerHTML += `
                <div class="column">
                    <span class="column-title">${col.label}</span>
                    <div class="time-left">${getTimeLeft(col.id)}</div>
                    <div class="progress-header"><span class="progress-percent">${percent}%</span></div>
                    <div class="progress-container"><div class="progress-bar" style="width:${percent}%"></div></div>
                    <ul>${listHtml}</ul>
                </div>`;
        });

        localStorage.setItem('v28_tasks', JSON.stringify(allTasks));
        localStorage.setItem('v28_counts', JSON.stringify(totalCounts));
    }

    function openEditModal(id) {
        const task = allTasks.find(t => t.id === id);
        document.getElementById('editTaskId').value = id;
        document.getElementById('taskName').value = task.text;
        document.getElementById('taskScope').value = task.scope;
        document.getElementById('taskDate').value = task.date || "";
        document.getElementById('taskRecur').value = task.recurrence || "";
        document.getElementById('hasDeps').checked = task.requirements?.length > 0;
        selectedDays = task.recurDays || [];
        document.querySelectorAll('.day-btn').forEach(btn => btn.classList.toggle('active', selectedDays.includes(parseInt(btn.dataset.day))));
        document.getElementById('recurMonthDay').value = task.recurMonthDay || 1;
        renderParentList(task.requirements);
        checkSteps();
        document.getElementById('taskModal').style.display = 'flex';
    }

    function deleteTask(id) { if(confirm("Supprimer ?")) { allTasks = allTasks.filter(t => t.id !== id); updateUI(); } }
    function closeModal() { document.getElementById('taskModal').style.display = 'none'; }
    updateUI();
</script>
</body>
</html>
