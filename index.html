<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Elite v14 - Maîtrise</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #050505; --card-bg: #111111; --text-main: #ffffff; --text-dim: #777;
            --accent-red: #ff3c3c; --accent-gold: #ffbc00;
        }

        body { 
            font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; width: 100%; max-width: 1400px; padding-bottom: 120px; }
        .column { background: var(--card-bg); border-radius: 24px; padding: 24px; border: 1px solid rgba(255,255,255,0.05); }
        .column-title { font-size: 1.2rem; font-weight: 800; color: var(--accent-red); text-transform: uppercase; margin-bottom: 15px; display: block; }
        
        .progress-container { background: #1a1a1a; height: 4px; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; transition: width 0.5s ease; background: var(--accent-red); }

        ul { list-style: none; padding: 0; margin: 0; }
        .task-card { 
            background: linear-gradient(145deg, #181818, #141414); margin-bottom: 12px; padding: 16px; 
            border-radius: 16px; border: 1px solid rgba(255,255,255,0.03); transition: 0.3s;
        }
        .task-card.locked { opacity: 0.35; filter: grayscale(1); }
        
        .check-circle { width: 22px; height: 22px; border: 2px solid #333; border-radius: 50%; cursor: pointer; position: relative; flex-shrink: 0; }
        .task-card.completed .check-circle { background: var(--accent-red); border-color: var(--accent-red); }
        .task-card.completed .check-circle::after { content: '✓'; position: absolute; color: white; font-size: 14px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .task-card.locked .check-circle::after { content: '🔒'; font-size: 10px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .stat-badge { font-size: 0.6rem; background: #222; color: #888; padding: 2px 6px; border-radius: 4px; margin-left: 8px; }
        .requirement-list { margin-top: 10px; font-size: 0.7rem; color: var(--accent-gold); }
        .req-item { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px solid rgba(255,188,0,0.1); }

        /* MODAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(10px); }
        .modal-content { background: #111; padding: 30px; border-radius: 24px; width: 90%; max-width: 480px; border: 1px solid #222; max-height: 85vh; overflow-y: auto; }
        input, select { width: 100%; background: #000; border: 1px solid #222; color: white; padding: 12px; border-radius: 10px; margin-bottom: 10px; }
        
        .parent-selector { background: #000; border: 1px solid #222; border-radius: 10px; padding: 10px; margin-bottom: 15px; }
        .parent-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 0.85rem; }
        .parent-row input[type="number"] { width: 60px; padding: 5px; margin-bottom: 0; text-align: center; }

        .btn-add { background: var(--accent-red); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .fab { position: fixed; bottom: 40px; right: 40px; width: 64px; height: 64px; background: var(--accent-red); border-radius: 20px; border: none; color: white; font-size: 32px; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>

<div id="addModal" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--accent-red); margin-top:0;">CRÉER UNE MISSION</h2>
        <input type="text" id="taskName" placeholder="Ex: Devenir un pro...">
        
        <label style="font-size: 0.7rem; color: #555;">PÉRIODE CIBLE</label>
        <select id="taskTarget">
            <option value="journalier">Aujourd'hui</option>
            <option value="hebdomadaire">Cette Semaine</option>
            <option value="mensuel">Ce Mois</option>
            <option value="annuel">Cette Année</option>
        </select>

        <label style="font-size: 0.7rem; color: #555;">PRÉ-REQUIS (Nom & Nb de fois)</label>
        <div class="parent-selector" id="parentList"></div>

        <label style="font-size: 0.7rem; color: #555;">RÉCURRENCE AUTOMATIQUE</label>
        <select id="taskRecur">
            <option value="">Une fois seule</option>
            <option value="Quotidien">Quotidien</option>
            <option value="Hebdomadaire">Hebdomadaire</option>
            <option value="Mensuel">Mensuel</option>
            <option value="Annuel">Annuel</option>
        </select>

        <button class="btn-add" onclick="createNewTask()">LANCER LA MISSION</button>
        <button style="width:100%; background:none; border:none; color:#444; margin-top:10px; cursor:pointer;" onclick="toggleModal(false)">Annuler</button>
    </div>
</div>

<h1>PERFORMANCE ELITE v14</h1>
<div class="dashboard-grid" id="mainGrid"></div>
<button class="fab" onclick="toggleModal(true)">+</button>

<script>
    let allData = JSON.parse(localStorage.getItem('v14_data')) || { journalier: [], hebdomadaire: [], mensuel: [], annuel: [] };
    // On stocke les accomplissements totaux par ID de tâche
    let totalCounts = JSON.parse(localStorage.getItem('v14_counts')) || {};
    let lastVisit = localStorage.getItem('v14_last_visit');
    const types = [{id:'journalier', label:"Aujourd'hui"}, {id:'hebdomadaire', label:"Semaine"}, {id:'mensuel', label:"Mois"}, {id:'annuel', label:"Année"}];

    function toggleModal(show) {
        if(show) {
            const list = document.getElementById('parentList');
            list.innerHTML = '';
            const allTasks = Object.values(allData).flat();
            if(allTasks.length === 0) list.innerHTML = '<span style="color:#444; font-size:0.8rem;">Créez d\'abord d\'autres missions.</span>';
            allTasks.forEach(t => {
                list.innerHTML += `
                    <div class="parent-row">
                        <input type="checkbox" class="parent-check" value="${t.id}">
                        <span style="flex-grow:1">${t.text}</span>
                        <input type="number" class="parent-quota" placeholder="Nb" value="1" min="1">
                    </div>`;
            });
            document.getElementById('addModal').style.display = 'flex';
        } else {
            document.getElementById('addModal').style.display = 'none';
        }
    }

    function createNewTask() {
        const name = document.getElementById('taskName').value.trim();
        const target = document.getElementById('taskTarget').value;
        const recur = document.getElementById('taskRecur').value;
        
        const requirements = [];
        document.querySelectorAll('.parent-row').forEach(row => {
            const cb = row.querySelector('.parent-check');
            if(cb.checked) {
                requirements.push({
                    parentId: cb.value,
                    quota: parseInt(row.querySelector('.parent-quota').value) || 1
                });
            }
        });

        if (!name) return;
        allData[target].push({ id: "T-"+Date.now(), text: name, requirements: requirements, recurrence: recur, completed: false });
        toggleModal(false);
        updateUI();
    }

    function toggleTask(type, id) {
        const task = allData[type].find(t => t.id === id);
        const allTasks = Object.values(allData).flat();

        // 1. Vérification des quotas requis
        if (task.requirements && task.requirements.length > 0) {
            const isLocked = task.requirements.some(req => {
                const count = totalCounts[req.parentId] || 0;
                return count < req.quota;
            });

            if (isLocked && !task.completed) {
                alert("Entraînement insuffisant pour débloquer cet objectif !");
                return;
            }
        }

        task.completed = !task.completed;

        if(task.completed) {
            // Incrémenter le compteur total de réussite pour cet ID
            totalCounts[task.id] = (totalCounts[task.id] || 0) + 1;
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.8 }, colors: ['#ff3c3c', '#ffbc00'] });
            
            // Cascade par nom (v10)
            if(type === "journalier") {
                types.forEach(col => {
                    allData[col.id].forEach(t => { 
                        if(t.text.toLowerCase() === task.text.toLowerCase() && t.id !== task.id) {
                            t.completed = true;
                            totalCounts[t.id] = (totalCounts[t.id] || 0) + 1;
                        }
                    });
                });
            }
        } else {
            // Si on décoche, on retire un point au compteur total
            totalCounts[task.id] = Math.max(0, (totalCounts[task.id] || 0) - 1);
        }
        
        updateUI();
    }

    function updateUI() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';
        const allTasksFlattened = Object.values(allData).flat();

        types.forEach(t => {
            const tasks = allData[t.id];
            const percent = tasks.length ? Math.round((tasks.filter(tk=>tk.completed).length / tasks.length)*100) : 0;
            let listHtml = '';

            tasks.forEach(tk => {
                let reqHtml = '';
                let isLocked = false;

                if(tk.requirements && tk.requirements.length > 0) {
                    reqHtml = '<div class="requirement-list">';
                    tk.requirements.forEach(req => {
                        const p = allTasksFlattened.find(at => at.id == req.parentId);
                        const current = totalCounts[req.parentId] || 0;
                        const pName = p ? p.text : "Inconnu";
                        if(current < req.quota) isLocked = true;
                        reqHtml += `<div class="req-item"><span>${pName}</span> <span>${current}/${req.quota}</span></div>`;
                    });
                    reqHtml += '</div>';
                }

                listHtml += `
                    <li class="task-card ${tk.completed ? 'completed' : ''} ${isLocked && !tk.completed ? 'locked' : ''}">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span class="badge" style="font-size:0.6rem; color:#444">${tk.recurrence || 'UNIQUE'}</span>
                            <div style="display:flex; align-items:center">
                                <span class="stat-badge">Total: ${totalCounts[tk.id] || 0}</span>
                                <button onclick="deleteTask('${t.id}', '${tk.id}')" style="background:none; border:none; color:#333; cursor:pointer; font-size:1.2rem; margin-left:10px;">×</button>
                            </div>
                        </div>
                        <div style="display:flex; align-items:center; gap:12px; margin-top:10px">
                            <div class="check-circle" onclick="toggleTask('${t.id}', '${tk.id}')"></div>
                            <span style="font-weight:600; cursor:pointer;" onclick="toggleTask('${t.id}', '${tk.id}')">${tk.text}</span>
                        </div>
                        ${reqHtml}
                    </li>
                `;
            });

            grid.innerHTML += `
                <div class="column">
                    <span class="column-title">${t.label}</span>
                    <div class="progress-container"><div class="progress-bar" style="width:${percent}%"></div></div>
                    <ul>${listHtml}</ul>
                </div>
            `;
        });
        localStorage.setItem('v14_data', JSON.stringify(allData));
        localStorage.setItem('v14_counts', JSON.stringify(totalCounts));
    }

    function deleteTask(type, id) {
        allData[type] = allData[type].filter(t => t.id !== id);
        updateUI();
    }

    function checkReset() {
        const now = new Date();
        const todayStr = now.toISOString().split('T')[0];
        if (lastVisit && lastVisit !== todayStr) {
            const lastDate = new Date(lastVisit);
            Object.keys(allData).forEach(col => {
                allData[col] = allData[col].filter(task => {
                    if (task.recurrence === "Quotidien") { task.completed = false; return true; }
                    if (task.recurrence === "Hebdomadaire" && (now.getDay() === 1 || (now - lastDate > 604800000))) { task.completed = false; return true; }
                    if (task.recurrence === "Mensuel" && (now.getMonth() !== lastDate.getMonth())) { task.completed = false; return true; }
                    if (task.recurrence === "Annuel" && (now.getFullYear() !== lastDate.getFullYear())) { task.completed = false; return true; }
                    return !task.completed;
                });
            });
        }
        localStorage.setItem('v13_last_visit', todayStr);
    }

    checkReset();
    updateUI();
</script>
</body>
</html>
