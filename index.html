<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Performance Elite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
:root {
  --bg:        #0d0d0f;
  --s1:        #141416;
  --s2:        #1a1a1d;
  --s3:        #202024;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.04);
  --text:      #f0f0f2;
  --text2:     #8a8a96;
  --text3:     #46464f;
  --violet:    #7c6af7;
  --blue:      #5b9cf6;
  --green:     #34d399;
  --amber:     #fbbf24;
  --red:       #f87171;
  --font: 'Plus Jakarta Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 100px;
}

/* ── TOPBAR ── */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(13,13,15,.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border2);
  padding: 0 28px; height: 64px;
  display: flex; align-items: center; justify-content: space-between;
}
.topbar-left { display: flex; align-items: center; gap: 14px; }
.logo {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--violet), var(--blue));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 800; color: #fff; flex-shrink: 0;
}
.topbar-title { font-size: .95rem; font-weight: 700; color: var(--text); }

.topbar-right { display: flex; align-items: center; gap: 20px; }
#dateDisplay { font-size: .75rem; font-weight: 500; color: var(--text3); letter-spacing: .4px; }

.btn-cal-toggle {
  background: var(--s2);
  border: 1px solid var(--border);
  color: var(--text3);
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 0.7rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.2s;
}
.btn-cal-toggle:hover { color: var(--text2); border-color: var(--text3); }

/* ── MAIN ── */
.main { padding: 28px 20px; max-width: 1440px; margin: 0 auto; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
  align-items: start;
}

/* ── COLUMN ── */
.col { background: var(--s1); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
.col-header { padding: 18px 18px 14px; border-bottom: 1px solid var(--border2); }
.col-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.col-label-wrap { display: flex; flex-direction: column; gap: 3px; }
.col-title { font-size: .95rem; font-weight: 700; color: var(--text); }
.time-left { font-size: .68rem; font-weight: 500; color: var(--text3); }

/* Ring */
.ring-wrap { position: relative; width: 42px; height: 42px; flex-shrink: 0; }
.ring-wrap svg { transform: rotate(-90deg); display: block; }
.ring-bg   { fill: none; stroke: var(--s3); stroke-width: 3.5; }
.ring-fill { fill: none; stroke-width: 3.5; stroke-linecap: round; transition: stroke-dashoffset .7s cubic-bezier(.4,0,.2,1); }
.ring-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: .58rem; font-weight: 800; }
.col-count { font-size: .68rem; font-weight: 600; color: var(--text3); margin-top: 2px; }

.prog-track { height: 3px; background: var(--s3); border-radius: 99px; overflow: hidden; }
.prog-bar   { height: 100%; border-radius: 99px; opacity: .65; transition: width .7s cubic-bezier(.4,0,.2,1); }

/* ── TASK LIST ── */
.task-list { list-style: none; padding: 10px; display: flex; flex-direction: column; gap: 6px; min-height: 50px; }

.task-card {
  background: var(--s2);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 12px 13px;
  transition: background .18s, border-color .18s, opacity .2s, transform .1s;
  cursor: grab;
}
.task-card.dragging { opacity: 0.4; transform: scale(0.98); }
.task-card:hover { background: var(--s3); border-color: var(--border); }
.task-card.locked { opacity: .25; filter: grayscale(1); pointer-events: none; }
.task-card.done { background: rgba(52,211,153,.04); border-color: rgba(52,211,153,.13); }

.task-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; pointer-events: none; }
.recur-pill { font-size: .58rem; font-weight: 700; letter-spacing: .7px; text-transform: uppercase; color: var(--text3); background: var(--s3); padding: 2px 7px; border-radius: 99px; }
.del-btn { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; background: none; border: none; color: var(--text3); cursor: pointer; border-radius: 6px; pointer-events: auto; }
.del-btn:hover { background: rgba(248,113,113,.1); color: var(--red); }

.task-body { display: flex; align-items: center; gap: 11px; }
.check { width: 20px; height: 20px; border: 2px solid var(--s3); border-radius: 7px; flex-shrink: 0; cursor: pointer; position: relative; background: var(--s1); }
.task-card.done .check { background: var(--green); border-color: var(--green); }
.task-card.done .check::after { content: ''; position: absolute; inset: 0; background: url("data:image/svg+xml,%3Csvg viewBox='0 0 12 10' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 5l3.5 3.5L11 1' stroke='%23fff' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") center/11px no-repeat; }
.task-text { font-size: .875rem; font-weight: 500; color: var(--text); flex: 1; }
.task-card.done .task-text { color: var(--text3); text-decoration: line-through; }

/* ── CALENDAR MODAL ── */
.cal-container { width: 100%; }
.cal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
.cal-day-name { font-size: 0.65rem; font-weight: 700; color: var(--text3); text-transform: uppercase; padding-bottom: 5px; }
.cal-cell {
  aspect-ratio: 1;
  background: var(--s2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  font-weight: 600;
  position: relative;
}
.cal-cell.today { border-color: var(--violet); color: var(--violet); }
.cal-cell.empty { opacity: 0; pointer-events: none; }
.cal-dots { display: flex; gap: 3px; margin-top: 4px; height: 4px; }
.dot { width: 4px; height: 4px; border-radius: 50%; }

/* ── UI ELEMENTS ── */
.fab { position: fixed; bottom: 28px; right: 28px; width: 54px; height: 54px; background: linear-gradient(135deg, var(--violet), var(--blue)); border: none; border-radius: 16px; color: #fff; cursor: pointer; z-index: 200; display: flex; align-items: center; justify-content: center; transition: transform .15s; }
.overlay { position: fixed; inset: 0; background: rgba(5,5,8,.82); backdrop-filter: blur(18px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 12px; }
.modal { background: var(--s1); border: 1px solid var(--border); border-radius: 24px; padding: 24px; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; }
.hidden { display: none !important; }

#bravo { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; z-index: 9999; opacity: 0; }
#bravo.show { animation: bravoAnim 1.8s ease forwards; }
@keyframes bravoAnim { 0% { opacity:0; transform:scale(.65); } 14% { opacity:1; transform:scale(1.06); } 100% { opacity:0; transform:scale(1.1); } }
.bravo-word { font-size: clamp(5rem,18vw,10rem); font-weight: 800; background: linear-gradient(135deg, var(--violet), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
</style>
</head>
<body>

<div id="bravo">
  <div class="bravo-word">BRAVO</div>
</div>

<header class="topbar">
  <div class="topbar-left">
    <div class="logo">P</div>
    <span class="topbar-title">Performance Elite</span>
  </div>
  <div class="topbar-right">
    <span id="dateDisplay"></span>
    <button class="btn-cal-toggle" onclick="openCalendar()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
      Calendrier
    </button>
  </div>
</header>

<main class="main">
  <div class="grid" id="grid"></div>
</main>

<button class="fab" onclick="openModal()" title="Nouvel objectif">
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 3v14M3 10h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
</button>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header" style="display:flex; justify-content:space-between; margin-bottom:20px;">
      <span class="modal-title" id="modalTitle" style="font-weight:800">Nouvel objectif</span>
      <button onclick="closeModal()" style="background:none; border:none; color:var(--text3); font-size:20px; cursor:pointer">×</button>
    </div>
    <input type="hidden" id="editId">
    <div class="form-group">
      <label class="form-label" style="display:block; font-size:0.65rem; color:var(--text3); text-transform:uppercase; margin-bottom:5px">Nom</label>
      <input type="text" id="fName" oninput="syncForm()" style="width:100%; background:var(--s2); border:1px solid var(--border); padding:10px; border-radius:10px; color:var(--text)">
    </div>
    <div class="form-group hidden" id="grpScope">
        <label class="form-label">Portée</label>
        <select id="fScope" onchange="syncForm()" style="width:100%; background:var(--s2); border:1px solid var(--border); padding:10px; border-radius:10px; color:var(--text)">
          <option value="today">Journalier</option>
          <option value="week">Semaine</option>
          <option value="month">Mois</option>
          <option value="year">Année</option>
        </select>
    </div>
    <div id="grpSubmitBtn" class="hidden" style="margin-top:20px">
        <button class="btn-save" onclick="saveTask()" style="width:100%; padding:12px; background:var(--violet); border:none; border-radius:12px; color:white; font-weight:700; cursor:pointer">Enregistrer</button>
    </div>
  </div>
</div>

<div class="overlay" id="calOverlay">
  <div class="modal" style="max-width:500px">
    <div class="cal-head">
      <button onclick="changeMonth(-1)" style="background:none; border:none; color:var(--text2); cursor:pointer">←</button>
      <span id="calMonthLabel" style="font-weight:700; font-size:1rem"></span>
      <button onclick="changeMonth(1)" style="background:none; border:none; color:var(--text2); cursor:pointer">→</button>
    </div>
    <div class="cal-grid" id="calendarGrid"></div>
    <button onclick="closeCalendar()" style="width:100%; margin-top:20px; background:none; border:none; color:var(--text3); cursor:pointer; font-size:0.8rem">Fermer</button>
  </div>
</div>

<script>
let tasks  = JSON.parse(localStorage.getItem('v28_tasks'))  || [];
let counts = JSON.parse(localStorage.getItem('v28_counts')) || {};
let currentCalDate = new Date();

const COLS = [
  { id: 'today', label: "Aujourd'hui" },
  { id: 'week',  label: 'Cette semaine' },
  { id: 'month', label: 'Ce mois' },
  { id: 'year',  label: 'Cette année' },
];

const COL_COLOR = { today: '#7c6af7', week: '#5b9cf6', month: '#34d399', year: '#fbbf24' };

function save() {
  localStorage.setItem('v28_tasks',  JSON.stringify(tasks));
  localStorage.setItem('v28_counts', JSON.stringify(counts));
}

// ── DRAG & DROP ──
function initDragAndDrop() {
  document.querySelectorAll('.task-list').forEach(list => {
    list.addEventListener('dragover', e => {
      e.preventDefault();
      const dragging = document.querySelector('.dragging');
      const afterElement = [...list.querySelectorAll('.task-card:not(.dragging)')].reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = e.clientY - box.top - box.height / 2;
        return (offset < 0 && offset > closest.offset) ? { offset, element: child } : closest;
      }, { offset: Number.NEGATIVE_INFINITY }).element;
      if (!afterElement) list.appendChild(dragging); else list.insertBefore(dragging, afterElement);
    });
    list.addEventListener('drop', () => {
      const newTasks = [];
      document.querySelectorAll('.task-card').forEach(el => newTasks.push(tasks.find(t => t.id === el.dataset.id)));
      tasks.forEach(t => { if(!newTasks.find(nt => nt.id === t.id)) newTasks.push(t); });
      tasks = newTasks; save();
    });
  });
}

// ── CALENDRIER ──
function openCalendar() {
  document.getElementById('calOverlay').style.display = 'flex';
  renderCalendar();
}
function closeCalendar() { document.getElementById('calOverlay').style.display = 'none'; }
function changeMonth(dir) {
  currentCalDate.setMonth(currentCalDate.getMonth() + dir);
  renderCalendar();
}

function renderCalendar() {
  const grid = document.getElementById('calendarGrid');
  const label = document.getElementById('calMonthLabel');
  grid.innerHTML = '';

  const year = currentCalDate.getFullYear();
  const month = currentCalDate.getMonth();
  label.textContent = new Intl.DateTimeFormat('fr-FR', { month: 'long', year: 'numeric' }).format(currentCalDate);

  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDay = new Date(year, month, 1).getDay();
  const startOffset = firstDay === 0 ? 6 : firstDay - 1;

  ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'].forEach(d => {
    grid.insertAdjacentHTML('beforeend', `<div class="cal-day-name">${d}</div>`);
  });

  for (let i = 0; i < startOffset; i++) grid.insertAdjacentHTML('beforeend', `<div class="cal-cell empty"></div>`);

  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    const dObj = new Date(year, month, day);
    const isToday = new Date().toDateString() === dObj.toDateString();
    
    // Trouver les tâches pour ce jour
    const dayTasks = tasks.filter(t => {
        if (t.scope === 'today') return true; // simplifié pour la démo
        return false;
    });

    let dotsHtml = '<div class="cal-dots">';
    // On affiche max 3 points pour le design
    const colors = ['#7c6af7', '#5b9cf6', '#34d399'];
    for(let j=0; j<Math.min(dayTasks.length, 3); j++) {
        dotsHtml += `<div class="dot" style="background:${colors[j]}"></div>`;
    }
    dotsHtml += '</div>';

    grid.insertAdjacentHTML('beforeend', `
      <div class="cal-cell ${isToday ? 'today' : ''}">
        ${day}
        ${dayTasks.length > 0 ? dotsHtml : ''}
      </div>
    `);
  }
}

// ── LOGIQUE DE BASE ──
function render() {
  const now = new Date();
  document.getElementById('dateDisplay').textContent = now.toLocaleDateString('fr-FR', { day:'numeric', month:'long' });
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  COLS.forEach(col => {
    const c = COL_COLOR[col.id];
    const vis = tasks.filter(t => t.scope === col.id);
    const done = vis.filter(t => t.completed).length;
    const total = vis.length;
    const pct = total ? Math.round(done/total*100) : 0;
    const C = 100.5, offset = C - (pct/100)*C;

    const items = vis.map(t => `
      <li class="task-card${t.completed?' done':''}" draggable="true" data-id="${t.id}" ondragstart="this.classList.add('dragging')" ondragend="this.classList.remove('dragging')">
        <div class="task-top"><span class="recur-pill">Unique</span><button class="del-btn" onclick="deleteTask('${t.id}')">×</button></div>
        <div class="task-body"><div class="check" onclick="toggleTask('${t.id}')"></div><span class="task-text">${t.text}</span></div>
      </li>`).join('');

    grid.insertAdjacentHTML('beforeend', `
      <div class="col">
        <div class="col-header">
          <div class="col-top">
            <span class="col-title">${col.label}</span>
            <div class="ring-wrap">
              <svg width="42" height="42" viewBox="0 0 42 42"><circle class="ring-bg" cx="21" cy="21" r="16"/><circle class="ring-fill" cx="21" cy="21" r="16" stroke="${c}" stroke-dasharray="100.5" stroke-dashoffset="${offset}"/></svg>
              <span class="ring-pct" style="color:${c}">${pct}%</span>
            </div>
          </div>
        </div>
        <ul class="task-list">${items || '<div class="empty">Vide</div>'}</ul>
      </div>`);
  });
  initDragAndDrop();
  save();
}

function openModal() { document.getElementById('overlay').style.display='flex'; }
function closeModal() { document.getElementById('overlay').style.display='none'; }
function syncForm() {
    const name = document.getElementById('fName').value;
    document.getElementById('grpScope').classList.toggle('hidden', !name);
    document.getElementById('grpSubmitBtn').classList.toggle('hidden', !name);
}
function saveTask() {
    const t = { id: 'T-'+Date.now(), text: document.getElementById('fName').value, scope: document.getElementById('fScope').value, completed: false };
    tasks.push(t); closeModal(); render();
}
function toggleTask(id) { 
    const t = tasks.find(x => x.id === id); 
    t.completed = !t.completed; 
    if(t.completed) {
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#7c6af7', '#34d399'] });
        const b = document.getElementById('bravo'); b.classList.add('show'); setTimeout(()=>b.classList.remove('show'), 1800);
    }
    render(); 
}
function deleteTask(id) { tasks = tasks.filter(t => t.id !== id); render(); }

render();
</script>
</body>
</html>
