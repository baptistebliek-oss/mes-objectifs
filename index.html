<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Dashboard Vision</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --accent: #BB86FC;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        h1 { text-align: center; color: var(--accent); font-weight: 300; letter-spacing: 2px; }

        /* Grille principale */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        /* Colonnes (Cards) */
        .column {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            min-height: 400px;
        }

        .column-header {
            text-align: center;
            margin-bottom: 15px;
        }

        .column-title {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        /* Barre de progression spécifique à chaque colonne */
        .progress-container {
            background: #333;
            height: 6px;
            border-radius: 3px;
            margin: 10px 0;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            transition: width 0.5s ease, background-color 0.5s ease;
        }

        /* Inputs */
        .input-group {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }
        input {
            flex: 1;
            background: #121212;
            border: 1px solid #444;
            color: white;
            padding: 8px;
            border-radius: 5px;
        }
        .add-btn {
            background: var(--accent);
            border: none;
            color: black;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            padding: 0 12px;
        }

        /* Listes */
        ul { list-style: none; padding: 0; margin: 0; flex-grow: 1; }
        li {
            background: #252525;
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.9rem;
            animation: fadeIn 0.3s ease;
        }
        .task-text { cursor: pointer; flex-grow: 1; }
        .completed { text-decoration: line-through; color: #666; }
        .delete-btn { color: #ff5555; cursor: pointer; background: none; border: none; font-size: 1.1rem; }

        /* Agenda Link Section */
        .calendar-box {
            grid-column: 1 / -1;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            border: 1px dashed var(--accent);
            margin-top: 20px;
        }
        .calendar-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Bravo Overlay */
        #bravoOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; justify-content: center; align-items: center; z-index: 100; background: rgba(0,0,0,0.8); }
        #bravoOverlay h2 { font-size: 5rem; color: gold; text-shadow: 0 0 20px orange; }
    </style>
</head>
<body>

<div id="bravoOverlay"><h2>BRAVO !</h2></div>

<h1>MY VISION DASHBOARD</h1>

<div class="calendar-box">
    📅 <strong>Agenda :</strong> <a href="https://calendar.google.com" target="_blank" class="calendar-link">Ouvrir mon Google Calendar en un clic</a>
</div>

<div class="dashboard-grid">
    <div class="column" id="col-journalier">
        <div class="column-header">
            <div class="column-title">Aujourd'hui</div>
            <div class="progress-container"><div class="progress-bar"></div></div>
            <small class="perc">0%</small>
        </div>
        <div class="input-group">
            <input type="text" placeholder="Nouvelle tâche..." onkeypress="handleEnter(event, 'journalier')">
            <button class="add-btn" onclick="addTask('journalier')">+</button>
        </div>
        <ul id="list-journalier"></ul>
    </div>

    <div class="column" id="col-hebdomadaire">
        <div class="column-header">
            <div class="column-title">Cette Semaine</div>
            <div class="progress-container"><div class="progress-bar"></div></div>
            <small class="perc">0%</small>
        </div>
        <div class="input-group">
            <input type="text" placeholder="Objectif hebdo..." onkeypress="handleEnter(event, 'hebdomadaire')">
            <button class="add-btn" onclick="addTask('hebdomadaire')">+</button>
        </div>
        <ul id="list-hebdomadaire"></ul>
    </div>

    <div class="column" id="col-mensuel">
        <div class="column-header">
            <div class="column-title">Ce Mois</div>
            <div class="progress-container"><div class="progress-bar"></div></div>
            <small class="perc">0%</small>
        </div>
        <div class="input-group">
            <input type="text" placeholder="Objectif mensuel..." onkeypress="handleEnter(event, 'mensuel')">
            <button class="add-btn" onclick="addTask('mensuel')">+</button>
        </div>
        <ul id="list-mensuel"></ul>
    </div>

    <div class="column" id="col-annuel">
        <div class="column-header">
            <div class="column-title">Cette Année</div>
            <div class="progress-container"><div class="progress-bar"></div></div>
            <small class="perc">0%</small>
        </div>
        <div class="input-group">
            <input type="text" placeholder="Grand rêve..." onkeypress="handleEnter(event, 'annuel')">
            <button class="add-btn" onclick="addTask('annuel')">+</button>
        </div>
        <ul id="list-annuel"></ul>
    </div>
</div>

<script>
    let allData = JSON.parse(localStorage.getItem('multiColumnGoals')) || { 
        journalier: [], hebdomadaire: [], mensuel: [], annuel: [] 
    };

    function handleEnter(e, type) { if(e.key === 'Enter') addTask(type); }

    function addTask(type) {
        const input = document.querySelector(`#col-${type} input`);
        if (input.value.trim() === '') return;
        
        allData[type].push({ id: Date.now(), text: input.value, completed: false });
        input.value = '';
        updateUI();
    }

    function toggleTask(type, id) {
        allData[type] = allData[type].map(t => {
            if (t.id === id) {
                if(!t.completed) showBravo();
                return {...t, completed: !t.completed};
            }
            return t;
        });
        updateUI();
    }

    function deleteTask(type, id) {
        allData[type] = allData[type].filter(t => t.id !== id);
        updateUI();
    }

    function showBravo() {
        const overlay = document.getElementById('bravoOverlay');
        overlay.style.display = 'flex';
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        setTimeout(() => overlay.style.display = 'none', 1000);
    }

    function updateUI() {
        ['journalier', 'hebdomadaire', 'mensuel', 'annuel'].forEach(type => {
            const list = document.getElementById(`list-${type}`);
            const tasks = allData[type];
            list.innerHTML = '';

            tasks.forEach(t => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span class="task-text ${t.completed ? 'completed' : ''}" onclick="toggleTask('${type}', ${t.id})">
                        ${t.completed ? '✅ ' : '⭕ '} ${t.text}
                    </span>
                    <button class="delete-btn" onclick="deleteTask('${type}', ${t.id})">×</button>
                `;
                list.appendChild(li);
            });

            // Calcul progression
            const total = tasks.length;
            const comp = tasks.filter(t => t.completed).length;
            const percent = total === 0 ? 0 : Math.round((comp/total)*100);
            
            const col = document.getElementById(`col-${type}`);
            const bar = col.querySelector('.progress-bar');
            const percText = col.querySelector('.perc');
            
            bar.style.width = percent + '%';
            // Couleur dynamique (Rouge -> Orange -> Vert)
            const hue = percent * 1.2; // 0 = Rouge, 120 = Vert
            bar.style.backgroundColor = `hsl(${hue}, 70%, 50%)`;
            percText.innerText = percent + '%';
            percText.style.color = `hsl(${hue}, 70%, 50%)`;
        });
        
        localStorage.setItem('multiColumnGoals', JSON.stringify(allData));
    }

    // Initialisation
    updateUI();
</script>

</body>
</html>
