<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Dashboard Performance Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #161616;
            --text-main: #ffffff;
            --text-dim: #888888;
            --accent-red: #ff3c3c;
            /* Couleurs des catégories */
            --cat-sport: #4CAF50;
            --cat-work: #2196F3;
            --cat-perso: #FFEB3B;
            --cat-finance: #9C27B0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        h1 { text-align: center; color: var(--accent-red); font-weight: 800; letter-spacing: 3px; text-transform: uppercase; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .column {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
        }

        .column-header { text-align: center; margin-bottom: 10px; }
        .column-title { font-size: 1.1rem; font-weight: bold; color: var(--accent-red); text-transform: uppercase; }
        .timer { font-family: monospace; font-size: 0.8rem; color: var(--text-dim); }

        /* Progression */
        .progress-container { background: #222; height: 8px; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; transition: width 0.6s ease; }

        /* Inputs avec Catégories */
        .input-area { background: #111; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        .input-group { display: flex; gap: 5px; margin-top: 5px; }
        
        select, input { 
            background: #000; border: 1px solid #333; color: white; 
            padding: 8px; border-radius: 4px; outline: none;
        }
        select { font-size: 0.8rem; cursor: pointer; }
        input { flex: 1; }

        .add-btn { 
            background: var(--accent-red); border: none; color: white; 
            font-weight: bold; cursor: pointer; border-radius: 4px; padding: 0 12px;
        }

        /* Listes et Badges */
        ul { list-style: none; padding: 0; }
        li {
            background: #1f1f1f;
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            border-left: 4px solid var(--accent-red);
        }
        .task-header { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        
        .badge {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 5px;
            width: fit-content;
        }
        
        /* Couleurs badges */
        .badge-sport { background: var(--cat-sport); color: black; }
        .badge-travail { background: var(--cat-work); color: white; }
        .badge-perso { background: var(--cat-perso); color: black; }
        .badge-finance { background: var(--cat-finance); color: white; }
        .badge-autre { background: #555; color: white; }

        .task-text { cursor: pointer; flex-grow: 1; font-size: 0.9rem; }
        .completed { text-decoration: line-through; color: #555; opacity: 0.6; }
        .delete-btn { color: #444; cursor: pointer; background: none; border: none; font-size: 1rem; }
        .delete-btn:hover { color: red; }

        /* Agenda */
        .calendar-box { text-align: center; margin-bottom: 20px; padding: 10px; background: #111; border: 1px solid #222; border-radius: 8px; }
        .calendar-link { color: var(--accent-red); text-decoration: none; font-weight: bold; }

        #bravoOverlay { position: fixed; inset: 0; display: none; justify-content: center; align-items: center; z-index: 100; background: rgba(0,0,0,0.9); }
        #bravoOverlay h2 { font-size: 4rem; color: var(--accent-red); }
    </style>
</head>
<body>

<div id="bravoOverlay"><h2>BAM ! +1</h2></div>

<h1>DASHBOARD PERFORMANCE</h1>

<div class="calendar-box">
    📅 <a href="https://calendar.google.com" target="_blank" class="calendar-link">MON AGENDA GOOGLE</a>
</div>

<div class="dashboard-grid">
    <script>
        const types = [
            {id: 'journalier', label: "Aujourd'hui"},
            {id: 'hebdomadaire', label: "Semaine"},
            {id: 'mensuel', label: "Mois"},
            {id: 'annuel', label: "Année"}
        ];

        types.forEach(t => {
            document.write(`
                <div class="column" id="col-${t.id}">
                    <div class="column-header">
                        <div class="column-title">${t.label}</div>
                        <span class="timer" id="timer-${t.id}">00:00:00</span>
                        <div class="progress-container"><div class="progress-bar"></div></div>
                        <small class="perc">0%</small>
                    </div>
                    <div class="input-area">
                        <select id="cat-${t.id}">
                            <option value="autre">Catégorie...</option>
                            <option value="sport">🏃 Sport</option>
                            <option value="travail">💼 Travail</option>
                            <option value="perso">🏠 Perso</option>
                            <option value="finance">💰 Finance</option>
                        </select>
                        <div class="input-group">
                            <input type="text" id="in-${t.id}" placeholder="Objectif..." onkeypress="if(event.key==='Enter')addTask('${t.id}')">
                            <button class="add-btn" onclick="addTask('${t.id}')">+</button>
                        </div>
                    </div>
                    <ul id="list-${t.id}"></ul>
                </div>
            `);
        });
    </script>
</div>

<script>
    let allData = JSON.parse(localStorage.getItem('v3_performance_data')) || { 
        journalier: [], hebdomadaire: [], mensuel: [], annuel: [] 
    };

    function addTask(type) {
        const input = document.getElementById(`in-${type}`);
        const cat = document.getElementById(`cat-${type}`).value;
        if (input.value.trim() === '') return;
        
        allData[type].push({ 
            id: Date.now(), 
            text: input.value, 
            category: cat,
            completed: false 
        });
        input.value = '';
        updateUI();
    }

    function toggleTask(type, id) {
        allData[type] = allData[type].map(t => {
            if (t.id === id) {
                if(!t.completed) showBravo();
                return {...t, completed: !t.completed};
            }
            return t;
        });
        updateUI();
    }

    function deleteTask(type, id) {
        allData[type] = allData[type].filter(t => t.id !== id);
        updateUI();
    }

    function showBravo() {
        const overlay = document.getElementById('bravoOverlay');
        overlay.style.display = 'flex';
        confetti({ particleCount: 100, spread: 70, colors: ['#ff0000', '#ffffff'] });
        setTimeout(() => overlay.style.display = 'none', 800);
    }

    function updateTimers() {
        const now = new Date();
        const endDay = new Date().setHours(23,59,59);
        document.getElementById('timer-journalier').innerText = format(endDay - now);

        const endSun = new Date(); endSun.setDate(now.getDate() + (7 - now.getDay()) % 7); endSun.setHours(23,59,59);
        document.getElementById('timer-hebdomadaire').innerText = format(endSun - now, true);

        const endMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59);
        document.getElementById('timer-mensuel').innerText = format(endMonth - now, true);

        const endYear = new Date(now.getFullYear(), 11, 31, 23, 59, 59);
        document.getElementById('timer-annuel').innerText = format(endYear - now, true);
    }

    function format(ms, day=false) {
        let s=Math.floor(ms/1000), m=Math.floor(s/60), h=Math.floor(m/60), d=Math.floor(h/24);
        return (day?d+"j ":"")+ (h%24).toString().padStart(2,0)+":"+(m%60).toString().padStart(2,0)+":"+(s%60).toString().padStart(2,0);
    }

    function updateUI() {
        ['journalier', 'hebdomadaire', 'mensuel', 'annuel'].forEach(type => {
            const list = document.getElementById(`list-${type}`);
            list.innerHTML = '';
            const tasks = allData[type];

            tasks.forEach(t => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span class="badge badge-${t.category}">${t.category}</span>
                    <div class="task-header">
                        <span class="task-text ${t.completed ? 'completed' : ''}" onclick="toggleTask('${type}', ${t.id})">
                             ${t.text}
                        </span>
                        <button class="delete-btn" onclick="deleteTask('${type}', ${t.id})">×</button>
                    </div>
                `;
                list.appendChild(li);
            });

            const percent = tasks.length === 0 ? 0 : Math.round((tasks.filter(t=>t.completed).length / tasks.length)*100);
            const col = document.getElementById(`col-${type}`);
            col.querySelector('.progress-bar').style.width = percent + '%';
            col.querySelector('.progress-bar').style.backgroundColor = `hsl(0, 100%, ${30+(percent*0.4)}%)`;
            col.querySelector('.perc').innerText = percent + '%';
        });
        localStorage.setItem('v3_performance_data', JSON.stringify(allData));
    }

    setInterval(updateTimers, 1000);
    updateTimers();
    updateUI();
</script>
</body>
</html>
