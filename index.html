<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Performance Elite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
:root {
  --bg:       #0d0d0f;
  --s1:       #141416;
  --s2:       #1a1a1d;
  --s3:       #202024;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.04);
  --text:     #f0f0f2;
  --text2:    #8a8a96;
  --text3:    #46464f;
  --violet:   #7c6af7;
  --blue:     #5b9cf6;
  --green:    #34d399;
  --amber:    #fbbf24;
  --red:      #f87171;
  --font: 'Plus Jakarta Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 100px;
}

/* ── TOPBAR ── */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(13,13,15,.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border2);
  padding: 0 28px; height: 64px;
  display: flex; align-items: center; justify-content: space-between;
}
.topbar-left { display: flex; align-items: center; gap: 14px; }
.logo {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--violet), var(--blue));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 800; color: #fff; flex-shrink: 0;
}
.topbar-title { font-size: .95rem; font-weight: 700; color: var(--text); }
#dateDisplay { font-size: .75rem; font-weight: 500; color: var(--text3); letter-spacing: .4px; }

/* ── MAIN ── */
.main { padding: 28px 20px; max-width: 1440px; margin: 0 auto; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
  align-items: start;
}

/* ── COLUMN ── */
.col {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
}
.col-header {
  padding: 18px 18px 14px;
  border-bottom: 1px solid var(--border2);
}
.col-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.col-label-wrap { display: flex; flex-direction: column; gap: 3px; }
.col-title { font-size: .95rem; font-weight: 700; color: var(--text); }
.time-left { font-size: .68rem; font-weight: 500; color: var(--text3); }

/* Ring */
.ring-wrap { position: relative; width: 42px; height: 42px; flex-shrink: 0; }
.ring-wrap svg { transform: rotate(-90deg); display: block; }
.ring-bg   { fill: none; stroke: var(--s3); stroke-width: 3.5; }
.ring-fill { fill: none; stroke-width: 3.5; stroke-linecap: round;
             transition: stroke-dashoffset .7s cubic-bezier(.4,0,.2,1); }
.ring-pct {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: .58rem; font-weight: 800;
}
.col-count { font-size: .68rem; font-weight: 600; color: var(--text3); margin-top: 2px; }

.prog-track { height: 3px; background: var(--s3); border-radius: 99px; overflow: hidden; }
.prog-bar   { height: 100%; border-radius: 99px; opacity: .65; transition: width .7s cubic-bezier(.4,0,.2,1); }

/* ── TASK LIST ── */
.task-list { list-style: none; padding: 10px; display: flex; flex-direction: column; gap: 6px; }

.task-card {
  background: var(--s2);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 12px 13px;
  transition: background .18s, border-color .18s, opacity .2s, filter .2s;
}
.task-card:hover { background: var(--s3); border-color: var(--border); }
.task-card.locked { opacity: .25; filter: grayscale(1); pointer-events: none; }
.task-card.done { background: rgba(52,211,153,.04); border-color: rgba(52,211,153,.13); }

.task-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 9px;
}
.recur-pill {
  font-size: .58rem; font-weight: 700; letter-spacing: .7px;
  text-transform: uppercase; color: var(--text3);
  background: var(--s3); padding: 2px 7px; border-radius: 99px;
}
.del-btn {
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  background: none; border: none; color: var(--text3);
  cursor: pointer; border-radius: 6px;
  transition: background .15s, color .15s;
}
.del-btn:hover { background: rgba(248,113,113,.1); color: var(--red); }

.task-body { display: flex; align-items: center; gap: 11px; }

.check {
  width: 20px; height: 20px;
  border: 2px solid var(--s3); border-radius: 7px; flex-shrink: 0;
  cursor: pointer; position: relative; background: var(--s1);
  transition: background .2s, border-color .2s, transform .12s;
}
.check:hover { border-color: var(--violet); transform: scale(1.1); }
.task-card.done .check { background: var(--green); border-color: var(--green); }
.task-card.done .check::after {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 12 10' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 5l3.5 3.5L11 1' stroke='%23fff' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") center/11px no-repeat;
}

.task-text {
  font-size: .875rem; font-weight: 500; line-height: 1.45;
  color: var(--text); cursor: pointer; flex: 1;
  transition: color .15s;
}
.task-text:hover { color: #fff; }
.task-card.done .task-text { color: var(--text3); text-decoration: line-through; }

.sub-prog {
  height: 2px; background: var(--s3);
  border-radius: 99px; overflow: hidden; margin-top: 10px;
}
.sub-prog-fill { height: 100%; transition: width .4s ease; }

/* ── EMPTY ── */
.empty {
  text-align: center; padding: 30px 16px;
  color: var(--text3); font-size: .8rem;
}
.empty-icon { font-size: 1.6rem; margin-bottom: 6px; opacity: .35; }

/* ── FAB ── */
.fab {
  position: fixed; bottom: 28px; right: 28px;
  width: 54px; height: 54px;
  background: linear-gradient(135deg, var(--violet), var(--blue));
  border: none; border-radius: 16px; color: #fff;
  cursor: pointer; z-index: 200;
  box-shadow: 0 8px 28px rgba(124,106,247,.35);
  display: flex; align-items: center; justify-content: center;
  transition: transform .15s, box-shadow .15s;
}
.fab:hover { transform: scale(1.06) translateY(-2px); box-shadow: 0 14px 36px rgba(124,106,247,.45); }
.fab:active { transform: scale(.96); }

/* ── OVERLAY ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(5,5,8,.82);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  display: none; align-items: flex-end; justify-content: center;
  z-index: 1000; padding: 12px;
}
@media (min-width: 600px) { .overlay { align-items: center; } }

.modal {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 24px; padding: 24px;
  width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto;
  animation: slideUp .24s cubic-bezier(.4,0,.2,1);
}
@keyframes slideUp {
  from { opacity:0; transform: translateY(18px); }
  to   { opacity:1; transform: translateY(0); }
}
.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 22px;
}
.modal-title { font-size: 1rem; font-weight: 800; color: var(--text); }
.modal-close {
  width: 30px; height: 30px;
  background: var(--s2); border: 1px solid var(--border2);
  border-radius: 8px; color: var(--text2); font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .15s, color .15s;
}
.modal-close:hover { background: var(--s3); color: var(--text); }

.form-group { margin-bottom: 15px; }
.form-label {
  display: block; font-size: .68rem; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--text3); margin-bottom: 6px;
}
input[type="text"], input[type="date"], input[type="number"], select {
  width: 100%; background: var(--s2); border: 1px solid var(--border);
  color: var(--text); padding: 10px 13px; border-radius: 11px;
  font-family: var(--font); font-size: .875rem; font-weight: 500;
  outline: none; transition: border-color .2s, background .2s;
  -webkit-appearance: none;
}
input:focus, select:focus { border-color: var(--violet); background: var(--s3); }
select option { background: #1a1a1d; }

.toggle-row {
  display: flex; align-items: center; gap: 10px;
  background: var(--s2); border: 1px solid var(--border);
  border-radius: 11px; padding: 10px 13px; cursor: pointer;
  font-size: .875rem; font-weight: 500; color: var(--text2);
  transition: border-color .2s;
}
.toggle-row input[type="checkbox"] { accent-color: var(--violet); width: 15px; height: 15px; flex-shrink: 0; }

.days-row { display: flex; gap: 5px; margin-top: 10px; }
.day-btn {
  flex: 1; padding: 8px 0;
  background: var(--s2); border: 1px solid var(--border);
  border-radius: 9px; color: var(--text3);
  font-size: .7rem; font-weight: 600; cursor: pointer;
  text-align: center; transition: all .15s; font-family: var(--font);
}
.day-btn.on { background: var(--violet); color: #fff; border-color: var(--violet); }

.parent-list {
  background: var(--s2); border: 1px solid var(--border);
  border-radius: 11px; padding: 8px; margin-top: 8px;
}
.parent-row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 5px; font-size: .82rem; color: var(--text2);
  border-bottom: 1px solid var(--border2);
}
.parent-row:last-child { border-bottom: none; }
.parent-row input[type="checkbox"] { accent-color: var(--violet); flex-shrink: 0; }
.parent-row input[type="number"] { width: 54px; padding: 5px 8px; margin: 0; text-align: center; }
.parent-row span { flex: 1; }

.btn-save {
  width: 100%;
  background: linear-gradient(135deg, var(--violet), var(--blue));
  color: #fff; border: none; padding: 13px;
  border-radius: 12px; font-family: var(--font);
  font-size: .9rem; font-weight: 700; cursor: pointer;
  box-shadow: 0 4px 20px rgba(124,106,247,.28);
  transition: opacity .15s, transform .12s;
}
.btn-save:hover { opacity: .9; transform: translateY(-1px); }
.btn-cancel {
  width: 100%; background: none; border: none;
  color: var(--text3); padding: 10px; font-family: var(--font);
  font-size: .82rem; cursor: pointer; margin-top: 6px; transition: color .2s;
}
.btn-cancel:hover { color: var(--text2); }

.hidden { display: none !important; }

/* ── BRAVO ── */
#bravo {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  pointer-events: none; z-index: 9999; opacity: 0;
}
#bravo.show { animation: bravoAnim 1.8s ease forwards; }
@keyframes bravoAnim {
  0%   { opacity:0; transform:scale(.65); }
  14%  { opacity:1; transform:scale(1.06); }
  30%  { transform:scale(.98); }
  45%  { transform:scale(1.02); }
  68%  { opacity:1; transform:scale(1); }
  100% { opacity:0; transform:scale(1.1); }
}
.bravo-word {
  font-size: clamp(5rem,18vw,10rem); font-weight: 800; letter-spacing: 6px;
  background: linear-gradient(135deg, var(--violet) 0%, var(--blue) 50%, var(--green) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 0 50px rgba(124,106,247,.6)); line-height: 1;
}
.bravo-sub {
  font-size: .88rem; font-weight: 600; letter-spacing: 5px;
  text-transform: uppercase; color: rgba(255,255,255,.22); margin-top: 10px;
}

/* Lazy loading indicator */
.loading-more {
  text-align: center;
  padding: 20px;
  color: var(--text3);
  font-size: 0.8rem;
  grid-column: 1 / -1;
}
</style>
</head>
<body>

<div id="bravo">
  <div class="bravo-word">BRAVO</div>
  <div class="bravo-sub">Objectif accompli</div>
</div>

<header class="topbar">
  <div class="topbar-left">
    <div class="logo">P</div>
    <span class="topbar-title">Performance Elite</span>
  </div>
  <span id="dateDisplay"></span>
</header>

<main class="main">
  <div class="grid" id="grid"></div>
  <div class="loading-more hidden" id="loadingMore">Chargement...</div>
</main>

<button class="fab" onclick="openModal()" title="Nouvel objectif">
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
    <path d
